<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活動詳細 | 田中しほ</title>
  <link rel="stylesheet" href="src/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@700;800&display=swap" rel="stylesheet">
  <style>
    /* ハンバーガーボタン用の補強（style.cssの仕様に合わせる） */
    #menu-toggle {
      z-index: 101;
    }

    /* コメント欄のスタイル */
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 1.2em;
      margin: 1.5em 0;
    }
    .comment-bubble {
      background: #f5f7fa;
      border-radius: 16px;
      padding: 1em 1.2em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      max-width: 480px;
      position: relative;
    }
    .comment-bubble:before {
      content: '';
      position: absolute;
      left: 18px;
      top: -12px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 12px solid #f5f7fa;
    }
    .comment-name {
      font-size: 0.95em;
      color: #03709b;
      font-weight: bold;
      margin-bottom: 0.3em;
    }
    .comment-message {
      font-size: 1.05em;
      color: #222;
      white-space: pre-line;
    }
  </style>
</head>
<body data-page="policy">

  <header>
    <nav class="header-inner">
      <div id="header-name"></div>
      <div id="header-nav"></div>
      <button id="menu-toggle" aria-label="メニュー">☰</button>
    </nav>
  </header>

  <main class="container">
    <article class="article-content-wrapper">
      <div class="article-meta-area">
        <div id="article-meta" class="period"></div>
      </div>

      <h1 id="article-title" class="article-detail-title"></h1>
      <div id="article-content" class="article-detail-body"></div>
      <div id="article-photos" class="article-detail-photos"></div>
      
      <section class="comment-section">
        <h2 class="comment-title">読者の声</h2>
        <div id="comment-list" class="comment-list">
          </div>

        <div class="comment-post-box">
          <p class="comment-notice">この記事へのご意見・ご感想をお寄せください。活動の参考にさせていただきます。</p>
          <a id="comment-link" href="comment.html" class="comment-submit-button">この報告に感想を送る</a>
        </div>
      </section>

      <div class="back-link-area">
        <a href="policy.html" class="back-button">活動報告一覧へ戻る</a>
      </div>
    </article>
  </main>

  <script src="js/activity-reports.js"></script>
  
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    window.addEventListener('DOMContentLoaded', () => {
      if (id) {
        renderActivityReportDetail(id);
      } else {
        alert('記事IDが指定されていません。');
      }
    });

    async function renderActivityReportDetail(id) {
      try {
        const response = await fetch(`/api/activity-reports?id=${id}`);
        if (!response.ok) throw new Error('記事の取得に失敗しました。');
        
        const data = await response.json();
        if (data.success && data.reports && data.reports.length > 0) {
          const article = data.reports[0];
          
          // コメント送信リンクの設定
          const commentLink = document.getElementById('comment-link');
          if (commentLink) {
            commentLink.href = `comment.html?article_title=${encodeURIComponent(article.title)}`;
          }

          document.getElementById('article-title').innerText = article.title;
          document.getElementById('article-meta').innerText = `${article.year}`;
          document.getElementById('article-content').innerHTML = article.items ? article.items.join('<br><br>') : '';
          
          const photoContainer = document.getElementById('article-photos');
          photoContainer.innerHTML = '';
          if (article.photos && article.photos.length > 0) {
            article.photos.forEach(photo => {
              const img = document.createElement('img');
              img.src = photo.startsWith('assets/') ? `/${photo}` : `/assets/${photo}`;
              img.alt = `Photo for ${article.title}`;
              photoContainer.appendChild(img);
            });
          }

          // コメント取得処理
          await loadComments(article.title);

        } else {
          alert('指定された記事が見つかりませんでした。');
        }
      } catch (error) {
        console.error('記事の取得に失敗しました:', error);
      }
    }

    // コメント取得関数を独立（401エラー対策のログを追加）
    async function loadComments(title) {
      const commentList = document.getElementById('comment-list');
      try {
        const adminPassword = sessionStorage.getItem('adminPassword') || '';
        
        // パスワードがある時だけクエリに含める
        let url = `/api/comments?article_title=${encodeURIComponent(title)}`;
        if (adminPassword) {
          url += `&password=${encodeURIComponent(adminPassword)}`;
        }

        const commentRes = await fetch(url);

        if (commentRes.ok) {
          const comments = await commentRes.json();
          if (Array.isArray(comments) && comments.length > 0) {
            commentList.innerHTML = comments.map(comment => `
              <div class="comment-bubble">
                <div class="comment-name">${comment.name || '匿名'}さん</div>
                <div class="comment-message">${comment.message}</div>
              </div>
            `).join('');
          } else {
            commentList.innerHTML = '<p>まだコメントはありません。最初の感想をお寄せください。</p>';
          }
        } else {
          // ここで 401 が出なくなります
          commentList.innerHTML = '<p>コメントを表示できませんでした。</p>';
        }
      } catch (e) {
        console.error('コメント取得エラー:', e);
      }
    }
  </script>
  <script src="src/header.js"></script>
</body>
</html>
