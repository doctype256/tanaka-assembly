<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>読者の声 投稿 | 田中しほ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>

<body data-page="contact">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="contact-section">
    <h1 class="contact-title" id="page-title" style="font-family: 'Noto Serif JP', serif;"></h1>
    
    <div id="target-article-info" class="target-article-info"></div>

    <p class="contact-text" id="page-text"></p>

    <form class="contact-form" id="comment-form">
      <input type="hidden" id="article-title-input" name="article_title" value="">

      <div class="form-group">
        <label for="nickname">お名前（ペンネーム可）</label>
        <input type="text" id="nickname" name="nickname" placeholder="例：田中　しほ" required>
      </div>

      <div class="form-group">
        <label for="message">ご意見・ご感想</label>
        <textarea id="message" name="message" rows="8" placeholder="この記事を読んで感じたことなどをお聞かせください" required></textarea>
      </div>

      <div class="form-group privacy">
        <label class="privacy-label">プライバシーポリシー</label>
        <div class="privacy-box" id="privacy-body"></div>
        <label class="checkbox">
          <input type="checkbox" id="privacy-checkbox" required>
          <span id="privacy-agree-text"></span>
        </label>
      </div>

      <button type="submit" class="submit-button" id="submit-btn-text">送信する</button>
       <div class="back-link-area">
        <a href="policy.html" class="back-button">活動報告一覧へ戻る</a>
      </div>

    </form>
  </section>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const typeParam = params.get('type'); 
  const indexParam = params.get('index');
  
  fetch('data/static-texts.json')
    .then(res => res.json())
    .then(data => {
      // 1. ヘッダー情報の反映（rinen.name を優先、なければ profile.name）
      const headerName = data.rinen ? data.rinen.name : data.profile.name;
      document.getElementById('header-name').textContent = headerName;
      
      const nav = document.getElementById('header-nav');
      if (data.navigation) {
        data.navigation.forEach(n => {
          const a = document.createElement('a');
          a.href = n.href;
          a.textContent = n.text;
          nav.appendChild(a);
        });
      }

      // 2. 投書用データ(comment)の反映
      const commentConfig = data.comment;
      if (commentConfig) {
        document.title = `${commentConfig.title} | ${headerName}`;
        document.getElementById('page-title').textContent = commentConfig.title;
        document.getElementById('page-text').textContent = commentConfig.text;
        
        // プライバシーポリシーの反映
        const bodyWrapper = document.getElementById('privacy-body');
        bodyWrapper.innerHTML = ''; // クリア
        commentConfig.privacy.body.forEach(text => {
          const p = document.createElement('p');
          p.textContent = text;
          bodyWrapper.appendChild(p);
        });
        document.getElementById('privacy-agree-text').textContent = commentConfig.privacy.checkboxLabel;
      }

      // 3. 対象記事の特定と表示
      let article;
      if (typeParam === 'topics') {
        article = data.activities.topics;
      } else if (indexParam !== null && data.activities.reports) {
        article = data.activities.reports[indexParam];
      }

      const infoBox = document.getElementById('target-article-info');
      const titleInput = document.getElementById('article-title-input');

      if (article) {
        infoBox.innerHTML = `
          <p class="target-label" style="font-size:0.85rem; color:#666; margin-bottom:4px;">対象の活動報告：</p>
          <p class="target-title" style="font-weight:bold; color:#03709b; margin-bottom:20px;">「${article.title}」</p>
        `;
        titleInput.value = article.title;
      } else {
        titleInput.value = '一般的なご意見';
      }

      // 4. フォーム送信処理
      const commentForm = document.getElementById('comment-form');
      commentForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const articleTitle = titleInput.value.trim();
        const name = document.getElementById('nickname').value.trim();
        const message = document.getElementById('message').value.trim();

        if (!name || !message) {
          alert('お名前とご意見を入力してください。');
          return;
        }

        try {
          const commentData = {
            article_title: articleTitle,
            name: name,
            message: message,
          };

          const response = await fetch('/api/comments', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(commentData),
          });

          if (response.ok) {
            // 成功時は type=comment を付けてサンクスページへ
            window.location.href = `thanks.html?type=comment`;
          } else {
            const error = await response.json();
            alert(`送信に失敗しました: ${error.error}`);
          }
        } catch (error) {
          alert(`送信中にエラーが発生しました。`);
        }
      });
    })
    .catch(error => console.error("JSONの読み込みに失敗しました:", error));
</script>

<script src="src/header.js"></script>
</body>
</html>
