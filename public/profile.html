<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自己紹介</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <style>
    /* 地図のサイズを index.html と同様に 500px で固定 */
    .map-embed-wrapper { 
      position: relative; 
      width: 100%; 
      height: 500px; 
      border-radius: 12px; 
      overflow: hidden; 
      background: #f1f5f9;
    }
    .map-embed-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body data-page="policy">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="profile">
    <h1 class="profile-title" id="profile-title"></h1>
    <div class="profile-photo" id="profile-photo"></div>
    <div class="profile-name">
      <h2 id="profile-name"></h2>
      <p id="profile-name-en"></p>
      <span id="profile-role"></span>
    </div>
    <div class="profile-basic" id="profile-basic"></div>
    <section class="profile-history">
      <h3>経歴</h3>
      <div id="profile-history"></div>
    </section>
  </section>
</main>

<section class="page-header">
  <div class="page-header-inner">
    <h2 class="page-header-title" id="page-header-title"></h2>
    <p class="page-header-text" id="page-header-text"></p>
    <p class="page-header-text" id="page-header-tel"></p>
    <p class="page-header-text" id="page-header-mail"></p>
    <div class="page-header-columns">
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="page-header-map"></div>
      </div>
      <ul class="page-header-links" id="page-header-links"></ul>
    </div>
  </div>
</section>

<script>
async function loadProfile() {
  try {
    // プロフィール基本情報用の静的データ読み込み
    const staticRes = await fetch('data/static-texts.json');
    const staticData = await staticRes.json();
    let profile = staticData.profile;

    // --- 各種 API からデータを取得 ---
    try {
      const [profileRes, careerRes, topRes] = await Promise.all([
        fetch('/api/profile?password=admin777'),
        fetch('/api/career?password=admin777'),
        fetch('/api/top-page')
      ]);

      // 1. プロフィール基本情報の反映
      if (profileRes.ok) {
        const apiProfile = await profileRes.json();
        if (apiProfile && apiProfile.Name) {
          const photoUrl = apiProfile.IMG_URL?.trim() ? apiProfile.IMG_URL : profile.photo;
          profile = {
            ...profile,
            name: apiProfile.Name,
            photo: photoUrl,
            basic: [
              { label: '生年月日', value: apiProfile.birthday },
              { label: '出身地', value: apiProfile.From },
              { label: '家族構成', value: apiProfile.Family },
              { label: '趣味・特技', value: apiProfile.hobby }
            ].filter(item => item.value),
            role: apiProfile.Job || profile.role
          };
        }
      }

      // 2. キャリアデータの描画
      let careers = [];
      if (careerRes.ok) careers = await careerRes.json();
      
      document.title = `${profile.name}`;
      document.getElementById('header-name').textContent = profile.name;
      document.getElementById('profile-title').textContent = profile.title;
      document.getElementById('profile-name').textContent = profile.name;
      document.getElementById('profile-name-en').textContent = profile.name_en || '';
      document.getElementById('profile-role').textContent = profile.role || '';

      if (profile.photo) {
        const photoUrl = profile.photo.includes('cloudinary') ? `${profile.photo}?t=${Date.now()}` : profile.photo;
        document.getElementById('profile-photo').innerHTML = `<img src="${photoUrl}" alt="${profile.name}" loading="lazy">`;
      }

      const basicWrap = document.getElementById('profile-basic');
      basicWrap.innerHTML = '';
      profile.basic.forEach(item => {
        const div = document.createElement('div');
        div.className = 'basic-row';
        div.innerHTML = `<span class="dot"></span><div><strong>${item.label}</strong><p>${item.value}</p></div>`;
        basicWrap.appendChild(div);
      });

      const historyWrap = document.getElementById('profile-history');
      historyWrap.innerHTML = '';
      let historyItems = (Array.isArray(careers) && careers.length > 0)
        ? careers.map(c => ({ year: c.year + '年' + c.month + '月', text: c.Content }))
        : (profile.history || []);
      historyItems.forEach(h => {
        const div = document.createElement('div');
        div.className = 'history-row';
        div.innerHTML = `<span class="year">${h.year}</span><p>${h.text}</p>`;
        historyWrap.appendChild(div);
      });

      // 3. 地図と住所の表示ロジック（pageHeaders を参照せず API データのみを使用）
      if (topRes.ok) {
        const topData = await topRes.json();
        const mapSource = topData.address;

        // タイトルのみ staticData から取得（住所等は API 優先）
        const pageKey = document.body.dataset.page;
        const pageHeaderTitle = staticData.pageHeaders?.[pageKey]?.title || "所在地";
        document.getElementById('page-header-title').textContent = pageHeaderTitle;

        // 住所テキストの表示
        document.getElementById('page-header-text').textContent = mapSource || '';
        
        // 電話・メール・リンクは静的データが残っていれば表示（必要なければ空文字）
        const headerStatic = staticData.pageHeaders?.[pageKey] || {};
        document.getElementById('page-header-tel').textContent = headerStatic.tel ? `TEL. ${headerStatic.tel}` : '';
        document.getElementById('page-header-mail').textContent = headerStatic.mail ? `Mail. ${headerStatic.mail}` : '';

        // 地図の描画（ズーム倍率 20）
        const mapContainer = document.getElementById('page-header-map');
        if (mapSource) {
          if (mapSource.includes('<iframe')) {
            mapContainer.innerHTML = mapSource;
          } else {
            const encoded = encodeURIComponent(mapSource);
            mapContainer.innerHTML = `<iframe src="https://maps.google.com/maps?q=${encoded}&z=20&output=embed" loading="lazy"></iframe>`;
          }
        }

        // リンク一覧
        const linksWrap = document.getElementById('page-header-links');
        linksWrap.innerHTML = '';
        headerStatic.links?.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<a href="${item.url}">${item.label}</a>`;
          linksWrap.appendChild(li);
        });
      }

    } catch (e) { console.error('API Error:', e); }
  } catch (error) { console.error('Load Error:', error); }
}

loadProfile();
</script>

<script type="module" src="src/header.js"></script>
</body>
</html>
