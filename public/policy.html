<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>活動報告 | 田中しほ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="src/style.css">
  <style>
    /* 全体の突き出し防止 */
    .activity-grid {
      overflow-x: hidden;
      width: 100%;
    }

    /* カルーセル構造の最適化 */
    .pdf-carousel-wrapper {
      position: relative;
      width: 100%;
      overflow: hidden; /* 突き出しをここで完全にカット */
      padding: 20px 0;
    }

    .pdf-carousel {
      width: 100%;
      position: relative;
      overflow: visible; /* 移動アニメーションを見せる */
    }

    .pdf-carousel-inner {
      display: flex;
      transition: transform 0.5s ease;
      will-change: transform;
    }

    /* スマホ表示のカード設定 */
    @media (max-width: 767px) {
      .pdf-item {
        flex: 0 0 85% !important; /* 1枚の幅を85%に固定 */
        width: 85% !important;
        margin: 0 !important;
        opacity: 0.4;
        transform: scale(0.9);
        transition: all 0.4s ease;
        box-sizing: border-box;
      }
      .pdf-item.center {
        opacity: 1 !important;
        transform: scale(1.0) !important;
      }
      
      /* ナビボタンが消えないように調整 */
      .carousel-nav {
        z-index: 10;
        background: rgba(0,0,0,0.5) !important;
      }
    }

    .pdf-year-title.is-continuation {
      font-size: 1.1rem;
      opacity: 0.7;
      margin-top: -10px;
    }
    #menu-toggle { z-index: 101; }
  </style>
</head>
<body data-page="activity">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main class="activity">
  <button id="category-toggle" class="category-toggle">＞</button>

  <aside class="activity-sidebar" id="activity-sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">カテゴリー</h3>
      <div class="category-buttons" id="category-buttons"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">年代</h3>
      <div class="category-buttons" id="year-buttons"></div>
    </div>
  </aside>

  <div class="activity-grid">
    <h1 class="activity-title" id="activity-title" style="margin-bottom:30px;">活動報告</h1>
    <div id="carousel-root"></div>
  </div>
</main>

<script src="js/activity-reports.js"></script>

<script>
  let activeCategory = 'all';
  let activeYear = null;
  let activityData = null;
  let carouselIndices = {};
  let carouselTotalSlides = {};

  window.addEventListener('DOMContentLoaded', async () => {
    const checkDB = setInterval(async () => {
      if (typeof fetchActivityReports === 'function') {
        clearInterval(checkDB);
        const reports = await fetchActivityReports();
        activityData = { 
          categories: [
            { id: 'committee', label: '委員会活動' },
            { id: 'childcare', label: '子育て政策' },
            { id: 'reform', label: '京都府議会・定例会' },
            { id: 'topics', label: 'Topics' }
          ], 
          reports: reports.sort((a, b) => b.year - a.year)
        };
        render();
      }
    }, 100);
  });

  function render(scrollTop = false) {
    if (!activityData) return;
    const root = document.getElementById('carousel-root');
    root.innerHTML = '';
    carouselIndices = {};

    renderSidebarButtons();

    const allReports = activityData.reports;
    if (activeYear) {
      renderInChunks(`${activeYear}年の活動`, allReports.filter(r => Number(r.year) === activeYear));
    } else if (activeCategory === 'all') {
      activityData.categories.forEach(cat => {
        let filtered = allReports.filter(r => r.category === cat.id).slice(0, 3);
        if(filtered.length) renderCarousel(cat.id, cat.label, filtered);
      });
    } else {
      const catLabel = activityData.categories.find(c => c.id === activeCategory)?.label;
      renderInChunks(catLabel, allReports.filter(r => r.category === activeCategory));
    }
    if (scrollTop) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderInChunks(title, items) {
    for (let i = 0; i < items.length; i += 5) {
      renderCarousel(`chunk-${i}`, i > 0 ? `${title} (続き)` : title, items.slice(i, i + 5), i > 0);
    }
  }

  function renderCarousel(key, title, items, isContinuation = false) {
    carouselTotalSlides[key] = items.length;
    carouselIndices[key] = 0;

    const section = document.createElement('div');
    section.className = 'pdf-year-section';
    section.setAttribute('data-carousel-year', key);
    section.innerHTML = `
      <h2 class="pdf-year-title ${isContinuation ? 'is-continuation' : ''}">${title}</h2>
      <div class="pdf-carousel-wrapper">
        <div class="pdf-carousel">
          <button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${key}')">❮</button>
          <div class="pdf-carousel-inner">
            ${items.map(r => `
              <div class="pdf-item" onclick="location.href='article.html?type=report&id=${r.id}'">
                <div class="report-thumb">
                  <img src="${(r.photos && r.photos[0]) ? r.photos[0] : ''}" onerror="this.src='https://placehold.jp/24/03709b/ffffff/300x200.png?text=No+Photo'">
                </div>
                <div class="pdf-item-meta">${r.year}年 / ${activityData.categories.find(c=>c.id===r.category)?.label || ''}</div>
                <h3>${r.title}</h3>
                <div class="pdf-actions"><span class="pdf-btn">詳細を見る</span></div>
              </div>
            `).join('')}
          </div>
          <button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${key}')">❯</button>
        </div>
        <div class="carousel-dots">
          ${items.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${key}', ${i})"></div>`).join('')}
        </div>
      </div>
    `;
    document.getElementById('carousel-root').appendChild(section);
    setTimeout(() => updateCarouselIndex(key), 50);
  }

  // --- 【重要】左寄りを直すための 100% 基準計算 ---
  function updateCarouselIndex(key) {
    const section = document.querySelector(`[data-carousel-year="${key}"]`);
    if (!section) return;
    const inner = section.querySelector('.pdf-carousel-inner');
    const pdfItems = section.querySelectorAll('.pdf-item');
    const index = carouselIndices[key];

    // TOPページとロジックは同じですが、基準をvw(画面)ではなく100%(親)に固定
    const isMobile = window.innerWidth < 768;
    const itemWidth = isMobile ? 85 : 33.333; // 85% または 33.3%
    const offset = (100 - itemWidth) / 2;     // 親要素内での中央位置(7.5%など)
    
    // 移動量計算
    const moveX = (index * itemWidth) - offset;

    // translateX(-X%) で移動
    inner.style.transform = `translateX(${-moveX}%)`;
    
    pdfItems.forEach((item, i) => {
      item.classList.toggle('center', i === index);
    });

    const dots = section.querySelectorAll('.dot');
    dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
  }

  window.handlePrevClickIndex = (key) => {
    carouselIndices[key] = (carouselIndices[key] > 0) ? carouselIndices[key] - 1 : carouselTotalSlides[key] - 1;
    updateCarouselIndex(key);
  };
  window.handleNextClickIndex = (key) => {
    carouselIndices[key] = (carouselIndices[key] < carouselTotalSlides[key] - 1) ? carouselIndices[key] + 1 : 0;
    updateCarouselIndex(key);
  };
  window.goToSlideIndex = (key, idx) => {
    carouselIndices[key] = idx;
    updateCarouselIndex(key);
  };

  function renderSidebarButtons() {
    const catButtons = document.getElementById('category-buttons');
    const yearButtons = document.getElementById('year-buttons');
    if(!catButtons || !yearButtons) return;
    catButtons.innerHTML = `<button data-category="all" class="${activeCategory === 'all' && !activeYear ? 'is-active' : ''}">すべて</button>` +
      activityData.categories.map(cat => `<button data-category="${cat.id}" class="${activeCategory === cat.id && !activeYear ? 'is-active' : ''}">${cat.label}</button>`).join('');
    const years = [...new Set(activityData.reports.map(r => r.year))].sort((a,b)=>b-a);
    yearButtons.innerHTML = years.map(y => `<button data-year="${y}" class="${activeYear === Number(y) ? 'is-active' : ''}">${y}年</button>`).join('');
  }

  window.addEventListener('resize', () => Object.keys(carouselIndices).forEach(updateCarouselIndex));

  document.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (btn.dataset.category || btn.dataset.year) {
      if (btn.dataset.category) { activeCategory = btn.dataset.category; activeYear = null; }
      else { activeYear = Number(btn.dataset.year); activeCategory = null; }
      render(true);
    } else if (btn.id === 'category-toggle') {
      document.getElementById('activity-sidebar').classList.toggle('is-open');
    }
  });
</script>
<script src="src/header.js"></script>
</body>
</html>
