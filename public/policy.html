<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>活動報告 | 田中しほ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body data-page="activity">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle">☰</button>
  </nav>
</header>

<main class="activity">
  <button id="category-toggle" class="category-toggle">＞</button>

  <aside class="activity-sidebar" id="activity-sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">カテゴリー</h3>
      <div class="category-buttons" id="category-buttons"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">年代</h3>
      <div class="category-buttons" id="year-buttons"></div>
    </div>
  </aside>

  <div class="activity-grid">
    <h1 class="activity-title" id="activity-title" style="margin-bottom:30px;"></h1>
    <div id="carousel-root"></div>
  </div>
</main>

<script>
fetch('data/static-texts.json')
.then(res => res.json())
.then(data => {
  document.getElementById('header-name').textContent = data.profile.name;
  
  const nav = document.getElementById('header-nav');
  nav.innerHTML = '';
  data.navigation.forEach(n => {
    const a = document.createElement('a');
    a.href = n.href; a.textContent = n.text;
    nav.appendChild(a);
  });

  const activity = data.activities;
  document.getElementById('activity-title').textContent = activity.title;

  const sidebar = document.getElementById('activity-sidebar');
  const toggle = document.getElementById('category-toggle');
  const catButtons = document.getElementById('category-buttons');
  const yearButtons = document.getElementById('year-buttons');

  let activeCategory = 'all';
  let activeYear = null; 

  // ボタンの全消去関数
  function clearAllActive() {
    document.querySelectorAll('.category-buttons button').forEach(b => b.classList.remove('is-active'));
  }

  // 1. フィルターボタン生成（一つだけ光るロジック）
  const renderFilters = () => {
    // カテゴリー
    const isCatAllActive = (activeYear === null && activeCategory === 'all');
    catButtons.innerHTML = `<button data-category="all" class="${isCatAllActive ? 'is-active' : ''}">すべて</button>`;
    activity.categories.forEach(cat => {
      const isActive = (activeYear === null && activeCategory === cat.id);
      catButtons.innerHTML += `<button data-category="${cat.id}" class="${isActive ? 'is-active' : ''}">${cat.label}</button>`;
    });

    // 年代
    const isYearAllActive = (activeYear === 'all');
    yearButtons.innerHTML = `<button data-year="all" class="${isYearAllActive ? 'is-active' : ''}">すべての年</button>`;
    const years = [...new Set(activity.reports.map(r => r.year))].sort((a,b)=>b-a);
    years.forEach(y => {
      const isActive = (activeYear === y);
      yearButtons.innerHTML += `<button data-year="${y}" class="${isActive ? 'is-active' : ''}">${y}年</button>`;
    });
  };

  // 2. メイン描画関数
  function render(scrollTop = false) {
    const root = document.getElementById('carousel-root');
    root.innerHTML = '';
    renderFilters();

    const allReports = activity.reports;

    if (activeYear !== null && activeYear !== 'all') {
      const filtered = allReports.map((r, i) => ({...r, originalIndex: i})).filter(r => r.year === activeYear);
      if(filtered.length) renderCarousel(`${activeYear}年の活動`, filtered);
    } else if (activeYear === 'all') {
      const filtered = allReports.map((r, i) => ({...r, originalIndex: i})).sort((a,b) => b.year - a.year);
      if(filtered.length) renderCarousel(`すべての活動報告`, filtered);
    } else {
      activity.categories.forEach(cat => {
        if (activeCategory !== 'all' && cat.id !== activeCategory) return;
        const filtered = allReports.map((r, i) => ({...r, originalIndex: i})).filter(r => r.category === cat.id);
        if(filtered.length) renderCarousel(cat.label, filtered);
      });
    }
    if (scrollTop) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // 3. カルーセル生成（縦幅を大きくするための構造）
  function renderCarousel(title, items) {
    const section = document.createElement('div');
    section.className = 'pdf-year-section';
    section.innerHTML = `
      <h2 class="pdf-year-title">${title}</h2>
      <div class="pdf-list">
        <div class="pdf-carousel">
          <div class="pdf-carousel-inner">
            ${items.map(r => `
              <div class="pdf-item">
                <div class="report-thumb">
                  <img src="${(r.photos && r.photos[0]) ? r.photos[0] : ''}" onerror="this.src='https://placehold.jp/24/03709b/ffffff/300x200.png?text=No+Photo'">
                </div>
                <div class="pdf-item-meta">${r.year}年 / ${activity.categories.find(c=>c.id===r.category)?.label}</div>
                <h3>${r.title}</h3>
                <div class="pdf-actions">
                  <a href="article.html?type=report&index=${r.originalIndex}" class="pdf-btn">詳しく見る</a>
                </div>
              </div>
            `).join('')}
          </div>
          <button class="carousel-nav carousel-prev">❮</button>
          <button class="carousel-nav carousel-next">❯</button>
        </div>
      </div>
    `;
    document.getElementById('carousel-root').appendChild(section);
    initCarouselLogic(section);
  }

  function initCarouselLogic(section) {
    const inner = section.querySelector('.pdf-carousel-inner');
    const items = section.querySelectorAll('.pdf-item');
    if (items.length === 0) return;
    let currentIndex = 0;
    const update = () => {
      const isMobile = window.innerWidth < 768;
      const step = isMobile ? 85 : 33.333; 
      const offset = isMobile ? 7.5 : 33.333; 
      inner.style.transform = `translateX(${- (currentIndex * step) + offset}%)`;
      items.forEach((item, i) => item.classList.toggle('center', i === currentIndex));
    };
    section.querySelector('.carousel-next').onclick = () => { currentIndex = (currentIndex + 1) % items.length; update(); };
    section.querySelector('.carousel-prev').onclick = () => { currentIndex = (currentIndex - 1 + items.length) % items.length; update(); };
    update();
  }

  // --- 4. ご提示いただいたトグル＆クリックイベントの実装 ---
  catButtons.onclick = e => {
    const btn = e.target.closest('button');
    if (!btn || !btn.dataset.category) return;
    activeCategory = btn.dataset.category;
    activeYear = null; // 'all'ではなくnullにすることで年代側の「すべて」と重複させない
    clearAllActive();
    btn.classList.add('is-active');
    render(true);
    sidebar.classList.remove('is-open');
    toggle.textContent = '＞';
  };

  yearButtons.onclick = e => {
    const btn = e.target.closest('button');
    if (!btn || !btn.dataset.year) return;
    activeYear = btn.dataset.year === 'all' ? 'all' : Number(btn.dataset.year);
    activeCategory = null; 
    clearAllActive();
    btn.classList.add('is-active');
    render(true);
    sidebar.classList.remove('is-open');
    toggle.textContent = '＞';
  };

  toggle.onclick = () => {
    sidebar.classList.toggle('is-open');
    toggle.textContent = sidebar.classList.contains('is-open') ? '＜' : '＞';
  };

  render();
});
</script>
<script src="src/header.js"></script>
</body>
</html>
