<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>活動報告 | 田中しほ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <style>
    /* カルーセル用スタイル（CSSのスマホ85%を活かす設定） */
    .pdf-carousel { overflow: hidden; position: relative; width: 100%; }
    .pdf-carousel-inner { display: flex; flex-wrap: nowrap; transition: transform 0.4s ease-out; }
    
    @media (max-width: 767px) {
      .pdf-item {
        flex: 0 0 85% !important;
        margin: 0 5px;
      }
    }
    /* スクリプトが動く前のボタン消滅を防ぐための最低限の指定 */
    #menu-toggle {
      z-index: 101;
    }
    /* 段落ごとのタイトル（続き用）のスタイル調整 */
    .pdf-year-title.is-continuation {
      font-size: 1.1rem;
      opacity: 0.7;
      margin-top: -20px;
    }
  </style>
</head>
<body data-page="activity">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main class="activity">
  <button id="category-toggle" class="category-toggle">＞</button>

  <aside class="activity-sidebar" id="activity-sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">カテゴリー</h3>
      <div class="category-buttons" id="category-buttons"></div>
    </div>
    <div class="sidebar-section">
      <h3 class="sidebar-title">年代</h3>
      <div class="category-buttons" id="year-buttons"></div>
    </div>
  </aside>

  <div class="activity-grid">
    <h1 class="activity-title" id="activity-title" style="margin-bottom:30px;"></h1>
    <div id="carousel-root"></div>
  </div>
</main>

<script src="js/activity-reports.js"></script>

<script>
  let activeCategory = 'all';
  let activeYear = null;
  let activityData = null;

  window.addEventListener('DOMContentLoaded', async () => {
    try {
      const res = await fetch('data/static-texts.json');
      const data = await res.json();
      const titleEl = document.getElementById('activity-title');
      if (titleEl) titleEl.textContent = data.activities?.title || "活動報告";

      const checkDB = setInterval(async () => {
        if (typeof fetchActivityReports === 'function') {
          clearInterval(checkDB);
          const reports = await fetchActivityReports();
          activityData = { 
            categories: [
              { id: 'committee', label: '委員会活動' },
              { id: 'childcare', label: '子育て政策' },
              { id: 'reform', label: '京都府議会・定例会' },
              { id: 'topics', label: 'Topics' }
            ], 
            reports: reports.sort((a, b) => b.year - a.year)
          };
          render();
        }
      }, 100);
    } catch (e) { console.error(e); }
  });

  function render(scrollTop = false) {
    if (!activityData) return;
    const root = document.getElementById('carousel-root');
    root.innerHTML = '';
    
    // フィルタボタンの生成
    const catButtons = document.getElementById('category-buttons');
    const yearButtons = document.getElementById('year-buttons');
    if(catButtons && yearButtons) {
      catButtons.innerHTML = `<button data-category="all" class="${activeCategory === 'all' && !activeYear ? 'is-active' : ''}">すべて</button>`;
      activityData.categories.forEach(cat => {
        catButtons.innerHTML += `<button data-category="${cat.id}" class="${activeCategory === cat.id && !activeYear ? 'is-active' : ''}">${cat.label}</button>`;
      });
      const years = [...new Set(activityData.reports.map(r => r.year))].sort((a,b)=>b-a);
      yearButtons.innerHTML = '';
      years.forEach(y => {
        yearButtons.innerHTML += `<button data-year="${y}" class="${activeYear === Number(y) ? 'is-active' : ''}">${y}年</button>`;
      });
    }

    const allReports = activityData.reports;

    // --- 描画の分岐ロジック ---
    if (activeYear) {
      // 年代選択時：全件を3件ずつのカルーセルで表示
      const filtered = allReports.filter(r => Number(r.year) === activeYear);
      renderInChunks(`${activeYear}年の活動`, filtered);
    } else if (activeCategory === 'all') {
      // すべて：各カテゴリーの最新3件のみ
      activityData.categories.forEach(cat => {
        let filtered = allReports.filter(r => r.category === cat.id).slice(0, 3);
        if(filtered.length) renderCarousel(cat.label, filtered);
      });
    } else {
      // 特定カテゴリー選択時：全件を3件ずつのカルーセルで表示
      const catLabel = activityData.categories.find(c => c.id === activeCategory)?.label;
      const filtered = allReports.filter(r => r.category === activeCategory);
      renderInChunks(catLabel, filtered);
    }

    if (scrollTop) window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // データを3件ずつに分割してレンダリングする関数
  function renderInChunks(title, items) {
    const chunkSize = 5;
    for (let i = 0; i < items.length; i += chunkSize) {
      const chunk = items.slice(i, i + chunkSize);
      const isContinuation = i > 0;
      const displayTitle = isContinuation ? `${title} (続き)` : title;
      renderCarousel(displayTitle, chunk, isContinuation);
    }
  }

  function renderCarousel(title, items, isContinuation = false) {
    const section = document.createElement('div');
    section.className = 'pdf-year-section';
    section.innerHTML = `
      <h2 class="pdf-year-title ${isContinuation ? 'is-continuation' : ''}">${title}</h2>
      <div class="pdf-list">
        <div class="pdf-carousel">
          <div class="pdf-carousel-inner">
            ${items.map(r => `
              <div class="pdf-item">
                <div class="report-thumb">
                  <img src="${(r.photos && r.photos[0]) ? r.photos[0] : ''}" onerror="this.src='https://placehold.jp/24/03709b/ffffff/300x200.png?text=No+Photo'">
                </div>
                <div class="pdf-item-meta">${r.year}年 / ${activityData.categories.find(c=>c.id===r.category)?.label || ''}</div>
                <h3>${r.title}</h3>
                <div class="pdf-actions"><a href="article.html?type=report&id=${r.id}" class="pdf-btn">詳しく見る</a></div>
              </div>
            `).join('')}
          </div>
          <button class="carousel-nav carousel-prev">❮</button>
          <button class="carousel-nav carousel-next">❯</button>
        </div>
      </div>
    `;
    document.getElementById('carousel-root').appendChild(section);

    const carousel = section.querySelector('.pdf-carousel');
    const inner = section.querySelector('.pdf-carousel-inner');
    const cards = section.querySelectorAll('.pdf-item');
    let currentIndex = 0;

    const update = () => {
      if (cards.length === 0) return;
      const moveX = cards[currentIndex].offsetLeft - (carousel.offsetWidth / 2) + (cards[currentIndex].offsetWidth / 2);
      inner.style.transform = `translateX(${-moveX}px)`;
      cards.forEach((card, i) => card.classList.toggle('center', i === currentIndex));
    };

    section.querySelector('.carousel-next').onclick = () => { currentIndex = (currentIndex + 1) % cards.length; update(); };
    section.querySelector('.carousel-prev').onclick = () => { currentIndex = (currentIndex - 1 + cards.length) % cards.length; update(); };
    window.addEventListener('resize', update);
    setTimeout(update, 200);
  }

  document.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (btn.dataset.category) { 
      activeCategory = btn.dataset.category; 
      activeYear = null; 
      render(true); 
    }
    else if (btn.dataset.year) { 
      activeYear = Number(btn.dataset.year); 
      activeCategory = null; 
      render(true); 
    }
    else if (btn.id === 'category-toggle') {
      const sidebar = document.getElementById('activity-sidebar');
      sidebar.classList.toggle('is-open');
      btn.textContent = sidebar.classList.contains('is-open') ? '＜' : '＞';
    }
  });
</script>

<script src="src/header.js"></script>

</body>
</html>
