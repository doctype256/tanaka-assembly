<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ご相談フォーム</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">

  <style>
    /* フォーム埋め込み用のスタイル */
    .form-container {
      width: 100%;
      max-width: 600px;
      margin: 40px auto;
      background-color: #fff;
      border-radius: 12px;
      overflow: hidden;
      /* 背景を白にするためシャドウを少し調整して視認性を確保 */
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    iframe {
      width: 100%;
      height: 700px; /* フォームの高さに合わせて調整 */
      border: none;
      display: block;
    }

    .contact-section {
      padding: 40px 20px;
      /* 背景色をベージュ (#f9f3f0) から白 (#ffffff) に変更 */
      background-color: #ffffff;
      min-height: calc(100vh - 80px);
    }

    .contact-title {
      text-align: center;
      margin-bottom: 10px;
      font-family: 'Noto Serif JP', serif;
    }

    .contact-text {
      text-align: center;
      max-width: 600px;
      margin: 0 auto 30px;
      color: #666;
      font-size: 15px;
    }
  </style>
</head>

<body data-page="contact">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="contact-section">
    <h1 class="contact-title">ご相談フォーム</h1>
    <p class="contact-text">
      以下のステップに沿って、あなたのお悩みを聞かせてください。
    </p>

    <div class="form-container">
      <iframe src="/consultation" title="相談フォーム"></iframe>
    </div>
  </section>
</main>

<script>
  // ヘッダータイトルの取得
  fetch('/data/static-texts.json')
    .then(res => res.json())
    .then(data => {
      if (data.rinen && data.rinen.name) {
        document.getElementById('header-name').textContent = data.rinen.name;
      }
    });

  // フォーム送信完了時のイベント受信
  window.addEventListener('message', (event) => {
    // page.tsx からの通知を捕捉
    if (event.data === 'CONSULTATION_SUBMITTED') {
      console.log('相談が正常に送信されました。');
      // 送信完了後の挙動をここに追加可能
    }
  });
</script>

<script src="/src/header.js"></script>
</body>
</html>
