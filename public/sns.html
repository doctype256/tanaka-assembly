<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNSガイドライン</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">

</head>

<body data-page="policy">

  <div class="font-size-controls" aria-label="文字サイズ変更">
    <button data-size="small">小</button>
    <button data-size="normal" class="active">標準</button>
    <button data-size="large">大</button>
  </div>

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>

  <section class="profile-message">
    <h1 class="profile-title" id="sns-title"></h1>
    <div id="profile-message-text"></div>
  </section>

</main>

<section class="page-header">
  <div class="page-header-inner">

    <!-- ▼ タイトル・住所（縦並び） -->
    <h2 class="page-header-title" id="page-header-title"></h2>
    <p class="page-header-text" id="page-header-text"></p>

    <!-- ▼ 横並びエリア（flexはここだけ） -->
    <div class="page-header-columns">

      <!-- 左：マップ -->
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="page-header-map"></div>
      </div>

      <!-- 右：リンク集 -->
      <ul class="page-header-links" id="page-header-links"></ul>

    </div>

  </div>
</section>

<script>
fetch('data/static-texts.json')
  .then(res => res.json())
  .then(data => {

    /* ===== sns を基準にする ===== */
    const sns = data.sns;

    /* ===== title ===== */
    document.title = `${sns.title}｜${sns.name}`;

    /* ===== ヘッダー名 ===== */
    document.getElementById('header-name').textContent = sns.name;

    /* ===== ページタイトル ===== */
    document.getElementById('sns-title').textContent = sns.title;

    /* ===== 本文生成 ===== */
    const container = document.getElementById('profile-message-text');
    container.innerHTML = '';

    sns.items.forEach(text => {

    /* ===== X公式アカウントだけカード化 ===== */
      if (text === 'X（旧Twitter）：@ishin_tanaka_s') {

        const card = document.createElement('div');
        card.className = 'sns-card';

        card.innerHTML = `
          <div class="sns-card-label">公式 X（旧Twitter）</div>
          <a
            href="https://x.com/ishin_tanaka_s"
            target="_blank"
            rel="noopener"
            class="sns-card-account"
            aria-label="田中しほ 公式Xアカウントを開く"
          >
            @ishin_tanaka_s
          </a>
        `;

        container.appendChild(card);
        return;
      }

      const p = document.createElement('p');
      p.textContent = text;
      container.appendChild(p);
    });

    /* ===== ページヘッダー ===== */
    const page = document.body.dataset.page;
    if (data.pageHeaders && data.pageHeaders[page]) {

      const header = data.pageHeaders[page]; // ← ★これが必要

      document.getElementById('page-header-title').textContent =data.pageHeaders[page].title;
      
      document.getElementById('page-header-text').textContent =data.pageHeaders[page].text;

    /* ▼ Googleマップ埋め込み */
      const mapWrapper = document.getElementById('page-header-map');
      if (header.mapEmbed) {
        mapWrapper.innerHTML = `
          <iframe
            src="${header.mapEmbed}"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen
          ></iframe>
        `;
      } else {
        mapWrapper.innerHTML = '';
      }
      /* ▼ リンク集生成 */
        const linksWrapper = document.getElementById('page-header-links');
        linksWrapper.innerHTML = '';
  
        if (header.links && Array.isArray(header.links)) {
          header.links.forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
  
            a.href = item.url;
            a.textContent = item.label;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
  
            li.appendChild(a);
            linksWrapper.appendChild(li);
          });
        }
    }
  });
    /* ==============================
    文字サイズ切替（追記）
    ============================== */
  document.addEventListener('DOMContentLoaded', () => {
    const buttons = document.querySelectorAll('.font-size-controls button');
    if (!buttons.length) return;

    const savedSize = localStorage.getItem('fontSize') || 'normal';
    setFontSize(savedSize);

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const size = btn.dataset.size;
        setFontSize(size);
        localStorage.setItem('fontSize', size);
      });
    });

    function setFontSize(size) {
      document.body.classList.remove('font-small', 'font-normal', 'font-large');
      document.body.classList.add(`font-${size}`);

      buttons.forEach(b => b.classList.remove('active'));
      document
        .querySelector(`.font-size-controls button[data-size="${size}"]`)
        ?.classList.add('active');
    }
  });
</script>

<script src="src/header.js"></script>
</body>
</html>
