<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理者ページ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <style>
    .admin-container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .admin-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .admin-header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #333;
    }

    .admin-login {
      background-color: #f9f3f0;
      padding: 30px;
      border-radius: 8px;
      max-width: 400px;
      margin: 0 auto;
      display: none;
    }

    .admin-login.show {
      display: block;
    }

    .admin-login h2 {
      font-size: 20px;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #666;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      font-family: 'Noto Sans JP', sans-serif;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #ff6b9d;
      box-shadow: 0 0 4px rgba(255, 107, 157, 0.3);
    }

    .login-button {
      width: 100%;
      padding: 12px;
      background-color: #ff6b9d;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background-color 0.3s;
    }

    .login-button:hover {
      background-color: #ff5587;
    }

    .admin-content {
      display: none;
    }

    .admin-content.show {
      display: block;
    }

    .logout-button {
      float: right;
      padding: 10px 20px;
      background-color: #666;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      margin-bottom: 20px;
    }

    .logout-button:hover {
      background-color: #444;
    }

    .admin-stats {
      background-color: #f0f0f0;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 30px;
      clear: both;
    }

    .stat-item {
      display: inline-block;
      margin-right: 40px;
      margin-bottom: 10px;
    }

    .stat-label {
      color: #666;
      font-size: 14px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: #ff6b9d;
    }

    .comments-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .comments-table thead {
      background-color: #f0f0f0;
    }

    .comments-table th {
      padding: 15px;
      text-align: left;
      font-weight: 700;
      color: #333;
      border-bottom: 2px solid #ddd;
    }

    .comments-table td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    .comments-table tr:hover {
      background-color: #fafafa;
    }

    .comment-message {
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .delete-button {
      padding: 8px 16px;
      background-color: #ff6b9d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      transition: background-color 0.3s;
    }

    .delete-button:hover {
      background-color: #ff5587;
    }

    .approve-button {
      padding: 8px 16px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      transition: background-color 0.3s;
      margin-right: 5px;
    }

    .approve-button:hover {
      background-color: #45a049;
    }

    .unapprove-button {
      padding: 8px 16px;
      background-color: #ff9800;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 600;
      transition: background-color 0.3s;
      margin-right: 5px;
    }

    .unapprove-button:hover {
      background-color: #e68900;
    }

    .approval-status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 10px;
    }

    .approval-status.approved {
      background-color: #c8e6c9;
      color: #2e7d32;
    }

    .approval-status.pending {
      background-color: #ffe0b2;
      color: #e65100;
    }

    .error-message {
      color: #d32f2f;
      margin-bottom: 15px;
      padding: 10px;
      background-color: #ffebee;
      border-radius: 4px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #2e7d32;
      margin-bottom: 15px;
      padding: 10px;
      background-color: #e8f5e9;
      border-radius: 4px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .filter-section {
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-input {
      flex: 1;
      min-width: 200px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .filter-button {
      padding: 10px 20px;
      background-color: #ff6b9d;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .filter-button:hover {
      background-color: #ff5587;
    }

    .clear-filter-button {
      padding: 10px 20px;
      background-color: #ddd;
      color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .clear-filter-button:hover {
      background-color: #bbb;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 2px solid #ddd;
    }

    .tab-button {
      padding: 12px 20px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      color: #666;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab-button.active {
      color: #ff6b9d;
      border-bottom-color: #ff6b9d;
    }

    .tab-button:hover {
      color: #ff6b9d;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }
  </style>
</head>

<body data-page="admin">
 <!-- <header>
    <nav class="header-inner">
      <div id="header-name"></div>
      <div id="header-nav"></div>
      <button id="menu-toggle" aria-label="メニュー">☰</button>
    </nav>
  </header> -->

  <main>
  <div class="admin-container">
    <div class="admin-header">
      <h1>管理者ページ</h1>
      <p>コメント・お問い合わせの管理</p>
    </div>

    <!-- ログインフォーム -->
    <div id="login-form" class="admin-login show">
      <h2>管理者ログイン</h2>
      <div class="error-message" id="login-error"></div>
      <form id="login-input" autocomplete="off">
        <div class="form-group">
          <label for="password">パスワード</label>
          <input type="password" id="password" placeholder="パスワードを入力" autocomplete="new-password" required>
        </div>
        <button type="submit" class="login-button">ログイン</button>
      </form>
    </div>

    <!-- 管理画面 -->
    <div id="admin-content" class="admin-content">
      <button class="logout-button" id="logout-button">ログアウト</button>

      <!-- タブナビゲーション -->
      <div class="tabs">
        <button class="tab-button active" data-tab="comments-tab">コメント</button>
        <button class="tab-button" data-tab="contacts-tab">お問い合わせ</button>
        <button class="tab-button" data-tab="posts-tab">ご相談ポスト</button>
        <button class="tab-button" data-tab="profile-tab">自己紹介</button>
        <button class="tab-button" data-tab="pdf-tab">PDFファイル</button>
        <button class="tab-button" data-tab="activity-reports-tab">活動報告</button>
        <button class="tab-button" data-tab="top-page-edit" style="background-color: #e0f2fe; color: #0369a1;">トップページ編集</button>
      </div>

      <div id="top-page-edit" class="tab-content">
  <div class="card">
    <h2>トップページ編集</h2>
    <p>ヒーロー画像、住所、SNSリンクなどの基本情報を編集します。</p>
    <div style="margin-top: 20px;">
      <a href="test-top.html" class="login-button" style="display: inline-block; text-decoration: none; text-align: center; background-color: #0369a1;">
        別タブで編集画面を開く
      </a>
    </div>
    
    <iframe src="test-top.html" style="width: 100%; height: 800px; border: 1px solid #ddd; border-radius: 8px; margin-top: 20px;"></iframe>
  </div>
</div>

      <!-- コメントタブ -->
      <div id="comments-tab" class="tab-content active">
        <div class="admin-stats">
          <div class="stat-item">
            <div class="stat-label">総コメント数</div>
            <div class="stat-value" id="total-comments">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">記事数</div>
            <div class="stat-value" id="article-count">0</div>
          </div>
        </div>

        <div class="filter-section">
          <input type="text" id="filter-article" class="filter-input" placeholder="記事タイトルで検索...">
          <button class="filter-button" id="filter-button">検索</button>
          <button class="clear-filter-button" id="clear-filter">クリア</button>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <div id="comments-container"></div>
      </div>

      <!-- お問い合わせタブ -->
      <div id="contacts-tab" class="tab-content">
        <div class="admin-stats">
          <div class="stat-item">
            <div class="stat-label">総お問い合わせ数</div>
            <div class="stat-value" id="total-contacts">0</div>
          </div>
        </div>

        <div class="filter-section">
          <input type="text" id="filter-contact-email" class="filter-input" placeholder="メールアドレスで検索...">
          <button class="filter-button" id="filter-contact-button">検索</button>
          <button class="clear-filter-button" id="clear-contact-filter">クリア</button>
        </div>

        <div class="error-message" id="error-message-contact"></div>
        <div class="success-message" id="success-message-contact"></div>

        <div id="contacts-container"></div>
      </div>

      <!-- ご相談ポストタブ -->
      <div id="posts-tab" class="tab-content">
        <div class="admin-stats">
          <div class="stat-item">
            <div class="stat-label">総ポスト数</div>
            <div class="stat-value" id="total-posts">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">未承認</div>
            <div class="stat-value" id="unapproved-posts">0</div>
          </div>
        </div>

        <div class="error-message" id="error-message-posts"></div>
        <div class="success-message" id="success-message-posts"></div>

        <div id="posts-container"></div>
      </div>

      <!-- プロフィール編集タブ -->
      <div id="profile-tab" class="tab-content">
        <h3>自己紹介編集</h3>
        
        <form id="profile-form" class="profile-edit-form">
          <div class="form-group">
            <label for="profile-name">名前</label>
            <input type="text" id="profile-name" placeholder="例：京都府議会 田中　しほ" required>
          </div>

          <div class="form-group">
            <label for="profile-img-file">写真を選択（保存時に自動アップロード）</label>
            <input type="file" id="profile-img-file" accept="image/*" style="width: 100%;">
          </div>

          <div class="form-group">
            <label>写真プレビュー</label>
            <div id="profile-img-preview" style="margin: 10px 0; border: 1px solid #ccc; padding: 10px; text-align: center; min-height: 150px; display: flex; align-items: center; justify-content: center; background: #f9f9f9;"> 
              <img id="profile-preview-img" src="" alt="プレビュー" style="max-width: 100%; max-height: 200px; display: none;">
              <span id="profile-preview-placeholder" style="color: #999;">画像がアップロードされるとここに表示されます</span>
            </div>
            <input type="hidden" id="profile-img-url">
          </div>

          <div class="form-group">
            <label for="profile-birthday">生年月日</label>
            <input type="text" id="profile-birthday" placeholder="例：1994年7月21日" required>
          </div>

          <div class="form-group">
            <label for="profile-from">出身地</label>
            <input type="text" id="profile-from" placeholder="例：京都市" required>
          </div>

          <div class="form-group">
            <label for="profile-family">家族構成</label>
            <input type="text" id="profile-family" placeholder="例：夫・子ども2人" required>
          </div>

          <div class="form-group">
            <label for="profile-job">前職</label>
            <input type="text" id="profile-job" placeholder="例：ICU看護師" required>
          </div>

          <div class="form-group">
            <label for="profile-hobby">趣味・特技</label>
            <input type="text" id="profile-hobby" placeholder="例：ボランティア活動" required>
          </div>

          <button type="submit" class="login-button">プロフィール保存</button>
        </form>

        <div class="error-message" id="error-message-profile"></div>
        <div class="success-message" id="success-message-profile"></div>

        <!-- 経歴管理 -->
        <h3 style="margin-top: 40px;">経歴管理</h3>
        
        <form id="career-form" class="profile-edit-form" style="margin-bottom: 30px;">
          <div class="form-group">
            <label for="career-year">年</label>
            <input type="text" id="career-year" placeholder="例：2017" required>
          </div>

          <div class="form-group">
            <label for="career-month">月</label>
            <input type="text" id="career-month" placeholder="例：4月" required>
          </div>

          <div class="form-group">
            <label for="career-content">内容</label>
            <input type="text" id="career-content" placeholder="例：看護師としてICU勤務開始" required>
          </div>

          <button type="submit" class="login-button">経歴追加</button>
        </form>

        <div class="error-message" id="error-message-career"></div>
        <div class="success-message" id="success-message-career"></div>

        <!-- 経歴一覧 -->
        <div id="career-list-container"></div>
      </div>

      <!-- PDFファイルタブ -->
      <div id="pdf-tab" class="tab-content">
        <h3>PDFファイル管理</h3>
        
        <form id="pdf-form" class="profile-edit-form">
          <div class="form-group">
            <label for="pdf-title">タイトル</label>
            <input type="text" id="pdf-title" placeholder="例：活動報告書" required>
          </div>

          <div class="form-group">
            <label for="pdf-description">説明</label>
            <textarea id="pdf-description" placeholder="ファイルの説明" rows="4"></textarea>
          </div>

          <div class="form-group">
            <label for="pdf-file">PDFファイル</label>
            <input type="file" id="pdf-file" accept=".pdf" required>
          </div>

          <button type="submit" class="login-button">ファイルアップロード</button>
        </form>

        <div class="error-message" id="error-message-pdf"></div>
        <div class="success-message" id="success-message-pdf"></div>

        <!-- PDFファイル一覧 -->
        <div id="pdf-list-container" style="margin-top: 40px;"></div>
      </div>

      <!-- 活動報告タブ -->
<div id="activity-reports-tab" class="tab-content">
  <h3>活動報告編集</h3>

  <!-- 活動報告フォーム -->
  <form id="activity-report-form" class="profile-edit-form">
    <div class="form-group">
      <label for="activity-category">カテゴリー</label>
      <select id="activity-category" required>
        <option value="">選択してください</option>
        <option value="committee">危機管理・健康福祉常任委員会</option>
        <option value="childcare">子育て環境の充実に関する特別委員会</option>
        <option value="reform">身を切る改革の断行</option>
        <option value="topics">京都府庁の保育ルーム</option>
      </select>
    </div>

    <div class="form-group">
      <label for="activity-title">タイトル</label>
      <input type="text" id="activity-title" placeholder="活動報告のタイトル" required>
    </div>

    <div class="form-group">
      <label for="activity-year">年</label>
      <input type="number" id="activity-year" placeholder="例：2021" required>
    </div>

    <div class="form-group">
      <label for="activity-items">活動内容</label>
      <textarea id="activity-items" placeholder="活動の内容を記入" rows="10" style="min-height:200px;font-size:18px;width:100%;max-width:900px;" required></textarea>
    </div>

    <div class="form-group">
      <label for="activity-photos">写真</label>
      <input type="file" id="activity-photos" accept="image/*" multiple>
      <div id="activity-photos-preview" style="margin-top: 10px;"></div> <!-- プレビュー用 -->
    </div>

    <button type="submit" class="login-button">活動報告を保存</button>
  </form>

  <div class="error-message" id="error-message-activity-report"></div>
  <div class="success-message" id="success-message-activity-report"></div>

  <!-- 活動報告一覧 -->
  <h4>活動報告一覧</h4>
  <div id="activity-reports-list">
    <!-- 活動報告がここに動的に表示されます -->
  </div>
</div>
</main>

  <script src="src/header.js"></script>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
