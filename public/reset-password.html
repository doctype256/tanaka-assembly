<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>パスワード再設定</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container { max-width: 400px; margin: auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; }
    button { width: 100%; padding: 10px; margin-top: 10px; }
    .message { margin-top: 15px; color: green; }
    .error { margin-top: 15px; color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h2>新しいパスワードを設定</h2>

    <form id="reset-form">
      <div class="form-group">
        <label for="password">新しいパスワード</label>
        <input type="password" id="password" required>
      </div>

      <button type="submit">パスワードを更新</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    // URL から token を取得
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if (!token) {
      document.getElementById("result").textContent = "トークンが無効です。";
      document.getElementById("result").className = "error";
    }

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const password = document.getElementById("password").value;

      const res = await fetch("/api/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password })
      });

      const data = await res.json();

      const result = document.getElementById("result");
      result.textContent = data.message;
      result.className = res.ok ? "message" : "error";
    });
  </script>
</body>
</html>
