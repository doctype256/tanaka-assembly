<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPページ | 田中しほ</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .page-header-columns { display: flex; flex-direction: column; gap: 2rem; width: 100%; }
    @media (min-width: 1024px) { .page-header-columns { flex-direction: row; } }
    .page-header-left { flex: 1.5; }
    .map-embed-wrapper { 
      position: relative; 
      width: 100%; 
      height: 500px; 
      border-radius: 24px; 
      overflow: hidden; 
      background: #f0f0f0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .map-embed-wrapper iframe { border: 0; width: 100%; height: 100%; }

    .sns-icon-lucide {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      display: inline-block;
      vertical-align: middle;
    }
    .sns-icon-lucide.instagram { color: #E1306C; }
    .sns-icon-lucide.facebook { color: #1877F2; }
    .sns-icon-lucide.x { color: #000000; }
    .sns-icon-lucide.tiktok { color: #000000; }
    .sns-icon-lucide.line { color: #06C755; }
    .sns-icon-lucide.default { color: #666666; }
  </style>
</head>

<body data-page="policy">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
 <section class="hero">
  <div class="hero-image">
   <img id="dynamic-hero-img" src="images/hero-bg.jpg" alt="">
    <div class="hero-text-layer">
      <p id="dynamic-hero-text"></p>
      <h1 id="dynamic-hero-lawmaker"></h1>
      <h1 id="dynamic-hero-name"></h1>
    </div>
  </div>
</section>

<section class="consultation-section">
  <a href="post.html" class="consultation-card-integrated">
    <div class="card-content-overlay">
      <h2 class="card-main-title">子育ての疑問に寄り添う</h2>
      <p class="card-sub-title">あなたの声をお聞かせください</p>
      <div class="comment-submit-button">ご相談はコチラ ＞</div>
    </div>
  </a>
</section>

  <section class="youtube-section">
    <div class="video-wrapper" id="dynamic-yt-container">
      <div class="thumbnail-loading">動画読み込み中...</div>
    </div>
  </section>

  <section class="link-nav-section">
    <div class="link-grid">
      <a href="profile.html" class="link-card profile-link">
        <span class="en">Profile</span>
        <span class="jp">自己紹介 ＞</span>
      </a>
    </div>
  </section>

  <section class="news-section">
    <div class="news-block">
      <h2 class="shihopress-section-title">Shiho Press</h2>
      <div id="shiho-press-container"></div>
      <a href="pdf-text.html" class="more-btn">一覧へ ＞</a>
    </div>
    
    <div class="news-block">
      <h2 class="section-title">最新の活動報告</h2>
      <div id="policy-carousel-container"></div>
      <a href="policy.html" class="more-btn">一覧へ ＞</a>
    </div>
  </section>

  <section class="sns-jump-section">
    <h2 class="section-title">SNS</h2>
    <div class="sns-list" id="dynamic-sns-container"></div>
  </section>
</main>

<section class="page-header">
  <div class="page-header-inner">
    <h2 class="page-header-title" id="dynamic-addr"></h2>
    <p class="page-header-text" id="page-header-text"></p>
    <div class="page-header-columns">
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="dynamic-map-container"></div>
      </div>
      <ul class="page-header-links" id="page-header-links"></ul>
    </div>
  </div>
</section>

<script src="js/activity-reports.js"></script>

<script>
const ContentManager = {
  snsConfig: {
    'Instagram': { icon: 'instagram', colorClass: 'instagram' },
    'Facebook': { icon: 'facebook', colorClass: 'facebook' },
    'X': { icon: 'twitter', colorClass: 'x' },
    'TikTok': { icon: 'music', colorClass: 'tiktok' },
    'LINE': { icon: 'message-circle', colorClass: 'line' }
  },

  generateEmbedMapUrl(address, rawMapUrl) {
    if (address && address.trim() !== "") {
      const query = address.replace('〒', '').trim();
      return `https://maps.google.co.jp/maps?output=embed&q=${encodeURIComponent(query)}&z=20&iwloc=A`;
    }
    if (rawMapUrl && rawMapUrl.startsWith('http')) {
      if (rawMapUrl.includes('embed')) return rawMapUrl;
      return `https://maps.google.co.jp/maps?output=embed&q=${encodeURIComponent(rawMapUrl)}&z=17`;
    }
    return null;
  },

  applyData(data) {
    if (!data) return;
    if (data.heroImg) {
      const img = document.getElementById('dynamic-hero-img');
      img.classList.remove('is-visible');
      img.onload = () => img.classList.add('is-visible');
      img.src = data.heroImg;
    }
    const ytContainer = document.getElementById('dynamic-yt-container');
    const vId = this.parseYoutubeId(data.ytUrl);
    ytContainer.innerHTML = vId 
      ? `<iframe width="560" height="315" src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe>`
      : `<div style="padding:40px; text-align:center; color:#999;">動画未設定</div>`;

    const snsContainer = document.getElementById('dynamic-sns-container');
    const snsList = typeof data.snsJson === 'string' ? JSON.parse(data.snsJson || "[]") : data.snsJson;
    snsContainer.innerHTML = (snsList || []).map(sns => {
      const config = this.snsConfig[sns.platform] || { icon: 'link', colorClass: 'default' };
      return `
        <a href="${sns.url}" class="sns-row" target="_blank" rel="noopener">
          <div class="sns-left">
            <i data-lucide="${config.icon}" class="sns-icon-lucide ${config.colorClass}"></i>
            <span>${sns.platform}</span>
          </div>
          <span class="arrow">＞</span>
        </a>`;
    }).join('');

    document.getElementById('dynamic-addr').textContent = data.address || "";
    const mapContainer = document.getElementById('dynamic-map-container');
    const embedUrl = this.generateEmbedMapUrl(data.address, data.mapUrl);
    mapContainer.innerHTML = embedUrl
      ? `<iframe src="${embedUrl}" loading="lazy" allowfullscreen></iframe>`
      : `<div style="padding:20px; text-align:center; color:#999;">地図未設定</div>`;

    const page = document.body.dataset.page;
    if (data.pageHeaders && data.pageHeaders[page]) {
      const header = data.pageHeaders[page];
      document.getElementById('page-header-text').textContent = header.text || "";
      const linksWrapper = document.getElementById('page-header-links');
      if (header.links) {
        header.links.forEach(item => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = item.url;
          a.textContent = item.label;
          a.target = '_blank';
          li.appendChild(a);
          linksWrapper.appendChild(li);
        });
      }
    }
    if (window.lucide) lucide.createIcons();
  },

  parseYoutubeId(url) {
    if (!url) return null;
    const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }
};

const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let carouselIndices = {};
let carouselTotalSlides = {};

document.addEventListener('DOMContentLoaded', async () => {
  fetch('data/static-texts.json')
  .then(res => res.json())
  .then(data => {
    if (data.top) {
      document.getElementById('dynamic-hero-text').textContent = data.top.text || "";
      document.getElementById('dynamic-hero-lawmaker').textContent = data.top.lawmaker || "";
      document.getElementById('dynamic-hero-name').textContent = data.top.name || "";
    }
    document.querySelector('.hero-text-layer')?.classList.add('is-visible');
    setTimeout(() => document.getElementById('dynamic-hero-img')?.classList.add('float-in'), 500);
  });

  const checkDB = setInterval(async () => {
    if (typeof fetchActivityReports === 'function') {
      clearInterval(checkDB);
      const reports = await fetchActivityReports();
      if (reports?.length) {
        renderPolicyCarousel(reports.sort((a,b) => b.year - a.year).slice(0,4));
      }
    }
  }, 100);

  fetch('/api/top-page')
    .then(res => res.json())
    .then(data => ContentManager.applyData(data))
    .catch(err => console.error(err));

  loadLatestShihoPress();
});

// ===== Shiho Press 描画関数 (別タブでPDFを開く設定) =====
async function loadLatestShihoPress() {
  const container = document.getElementById('shiho-press-container');
  if (!container) return;

  try {
    const response = await fetch('/api/pdfs');
    if (!response.ok) throw new Error('API Error');
    const pdfs = await response.json();
    if (!pdfs || pdfs.length === 0) {
      container.innerHTML = '<p style="text-align:center; padding:20px;">現在、新しい記事はありません。</p>';
      return;
    }

    const years = pdfs.map(pdf => new Date(pdf.created_at).getFullYear());
    const latestYear = Math.max(...years);
    const latestYearData = pdfs.filter(pdf => new Date(pdf.created_at).getFullYear() === latestYear).sort((a, b) => b.id - a.id);

    const yearKey = 'shihopress_latest';
    carouselTotalSlides[yearKey] = latestYearData.length;
    carouselIndices[yearKey] = 0;

    container.innerHTML = `
      <div style="margin-bottom: 10px; font-weight: bold; color: #03709b;">最新：${latestYear}年度</div>
      <div class="pdf-year-section" data-carousel-year="${yearKey}">
        <div class="pdf-carousel-wrapper">
          <div class="pdf-carousel">
            <button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${yearKey}')">❮</button>
            <div class="pdf-carousel-inner" id="pdf-carousel-inner-${yearKey}">
              ${latestYearData.map(pdf => `
                <div class="pdf-item">
                  <div class="report-thumb" id="thumb-container-${pdf.id}" onclick="window.open('${pdf.file_path}', '_blank')" style="cursor: pointer;">
                    <div class="loading-spinner" style="height:200px; display:flex; align-items:center; justify-content:center; background:#f0f0f0; color:#999;">読み込み中...</div>
                  </div>
                  <div class="pdf-item-meta">${new Date(pdf.created_at).getFullYear()}年 / Shiho Press</div>
                  <h3>${pdf.title}</h3>
                  <div class="pdf-actions">
                    <button class="pdf-btn" onclick="window.open('${pdf.file_path}', '_blank')">PDFを開く</button>
                  </div>
                </div>
              `).join('')}
            </div>
            <button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${yearKey}')">❯</button>
          </div>
          <div class="carousel-dots">
            ${latestYearData.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${yearKey}', ${i})"></div>`).join('')}
          </div>
        </div>
      </div>`;

    updateCarouselIndex(yearKey);
    latestYearData.forEach(pdf => generatePdfThumbnail(pdf.file_path, `thumb-container-${pdf.id}`));

  } catch (error) {
    console.error('ShihoPress Carousel Error:', error);
  }
}

// サムネイル生成
async function generatePdfThumbnail(pdfUrl, containerId) {
  try {
    const loadingTask = pdfjsLib.getDocument(pdfUrl);
    const pdf = await loadingTask.promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 0.5 });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    await page.render({ canvasContext: context, viewport: viewport }).promise;
    
    const container = document.getElementById(containerId);
    if (container) {
      container.innerHTML = `<img src="${canvas.toDataURL()}" style="width:100%; height:200px; object-fit:cover;">`;
    }
  } catch (e) {
    console.error("Thumbnail error:", e);
  }
}

// 活動報告カルーセル描画
function renderPolicyCarousel(reports) {
  const container = document.getElementById('policy-carousel-container');
  const yearKey = 'policy_latest';
  carouselTotalSlides[yearKey] = reports.length;
  carouselIndices[yearKey] = 0;

  container.innerHTML = `
    <div class="pdf-year-section" data-carousel-year="${yearKey}">
      <div class="pdf-carousel-wrapper">
        <div class="pdf-carousel">
          <button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${yearKey}')">❮</button>
          <div class="pdf-carousel-inner" id="pdf-carousel-inner-${yearKey}">
            ${reports.map(r => `
              <div class="pdf-item" onclick="location.href='article.html?type=report&id=${r.id}'">
                <div class="report-thumb">
                  <img src="${(r.photos && r.photos[0]) ? r.photos[0] : ''}" onerror="this.src='https://placehold.jp/24/03709b/ffffff/300x200.png?text=No+Photo'">
                </div>
                <div class="pdf-item-meta">${r.year}年</div>
                <h3>${r.title}</h3>
                <div class="pdf-actions"><span class="pdf-btn">詳細を見る</span></div>
              </div>
            `).join('')}
          </div>
          <button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${yearKey}')">❯</button>
        </div>
        <div class="carousel-dots">
          ${reports.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${yearKey}', ${i})"></div>`).join('')}
        </div>
      </div>
    </div>`;
  updateCarouselIndex(yearKey);
}

// カルーセル共通操作
function updateCarouselIndex(key) {
  const section = document.querySelector(`[data-carousel-year="${key}"]`);
  if (!section) return;
  const inner = section.querySelector('.pdf-carousel-inner');
  const items = section.querySelectorAll('.pdf-item');
  const index = carouselIndices[key];
  const visibleItems = window.innerWidth < 768 ? 1 : (window.innerWidth < 1024 ? 2 : 3);
  const itemWidth = 100 / visibleItems;
  const offset = (visibleItems - 1) / 2;
  inner.style.transform = `translateX(${-(index - offset) * itemWidth}%)`;
  items.forEach((item, i) => item.classList.toggle('center', i === index));
  const dots = section.querySelectorAll('.dot');
  dots.forEach((dot, i) => dot.classList.toggle('active', i === index));
}

function handlePrevClickIndex(key) {
  const total = carouselTotalSlides[key];
  if (total <= 1) return;
  carouselIndices[key] = (carouselIndices[key] > 0) ? carouselIndices[key] - 1 : total - 1;
  updateCarouselIndex(key);
}

function handleNextClickIndex(key) {
  const total = carouselTotalSlides[key];
  if (total <= 1) return;
  carouselIndices[key] = (carouselIndices[key] < total - 1) ? carouselIndices[key] + 1 : 0;
  updateCarouselIndex(key);
}

function goToSlideIndex(key, index) {
  carouselIndices[key] = index;
  updateCarouselIndex(key);
}

window.addEventListener('resize', () => Object.keys(carouselIndices).forEach(updateCarouselIndex));
</script>
<script src="src/header.js"></script>
</body>
</html>
