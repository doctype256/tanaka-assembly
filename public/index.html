<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPページ</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 以前の良好なサイズ感（高さ500px）を維持しつつデザインを調整 */
    .page-header-columns { display: flex; flex-direction: column; gap: 2rem; width: 100%; }
    @media (min-width: 1024px) { .page-header-columns { flex-direction: row; } }
    .page-header-left { flex: 1.5; }
    .map-embed-wrapper { 
      position: relative; 
      width: 100%; 
      height: 500px; 
      border-radius: 24px; 
      overflow: hidden; 
      background: #f0f0f0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .map-embed-wrapper iframe { border: 0; width: 100%; height: 100%; }

    /* SNS公式アイコン表示用のスタイル追加 */
    .sns-icon-lucide {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      display: inline-block;
      vertical-align: middle;
    }
    .sns-icon-lucide.instagram { color: #E1306C; }
    .sns-icon-lucide.facebook { color: #1877F2; }
    .sns-icon-lucide.x { color: #000000; }
    .sns-icon-lucide.tiktok { color: #000000; }
    .sns-icon-lucide.line { color: #06C755; }
    .sns-icon-lucide.default { color: #666666; }
  </style>
</head>

<body data-page="policy">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="hero-image">
    <img id="dynamic-hero-img"  alt="背景">
  </section>

  <section class="consultation-section">
    <a href="post.html" class="consultation-banner">
      <div class="banner-content">
        <span class="banner-text">ご相談ポストはコチラ！</span>
        <span class="banner-sub">あなたの声をお聞かせください</span>
      </div>
      <div class="banner-icon">📩</div>
    </a>
  </section>

  <section class="youtube-section">
    <div class="video-wrapper" id="dynamic-yt-container">
      <div class="thumbnail-loading">動画読み込み中...</div>
    </div>
  </section>

  <section class="link-nav-section">
    <div class="link-grid">
      <a href="profile.html" class="link-card profile-link">
        <span class="en">Profile</span>
        <span class="jp">自己紹介 ＞</span>
      </a>
    </div>
  </section>

  <section class="news-section">
    <div class="news-block">
      <h2 class="shihopress-section-title">Shiho Press</h2>
      <div id="shiho-press-container"></div>
      <a href="pdf-text.html" class="more-btn">一覧へ ＞</a>
    </div>
    
    <div class="news-block">
      <h2 class="section-title">最新の活動報告</h2>
      <div id="policy-carousel-container"></div>
      <a href="policy.html" class="more-btn">一覧へ ＞</a>
    </div>
  </section>

  <section class="sns-jump-section">
    <h2 class="section-title">SNS</h2>
    <div class="sns-list" id="dynamic-sns-container"></div>
  </section>
</main>

<section class="page-header">
  <div class="page-header-inner">
    <h2 class="page-header-title" id="dynamic-addr"></h2>
    <p class="page-header-text" id="page-header-text"></p>
    <div class="page-header-columns">
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="dynamic-map-container"></div>
      </div>
      <ul class="page-header-links" id="page-header-links"></ul>
    </div>
  </div>
</section>

<script>
/**
 * ContentManager: データ反映およびURL変換のロジックをカプセル化
 */
const ContentManager = {
  snsConfig: {
    'Instagram': { icon: 'instagram', colorClass: 'instagram' },
    'Facebook': { icon: 'facebook', colorClass: 'facebook' },
    'X': { icon: 'twitter', colorClass: 'x' },
    'TikTok': { icon: 'music', colorClass: 'tiktok' },
    'LINE': { icon: 'message-circle', colorClass: 'line' }
  },

  /**
   * 住所があればそれを検索クエリとして使い、ピンの立ったズーム地図URLを生成する
   */
  generateEmbedMapUrl(address, rawMapUrl) {
    if (address && address.trim() !== "") {
      const query = address.replace('〒', '').trim();
      return `https://maps.google.co.jp/maps?output=embed&q=${encodeURIComponent(query)}&z=20&iwloc=A`;
    }

    if (rawMapUrl && rawMapUrl.startsWith('http')) {
      if (rawMapUrl.includes('embed')) return rawMapUrl;
      return `https://maps.google.co.jp/maps?output=embed&q=${encodeURIComponent(rawMapUrl)}&z=17`;
    }

    return null;
  },

  applyData(data) {
    if (!data) return;

    // 1. ヒーロー画像
    if (data.heroImg) {
      document.getElementById('dynamic-hero-img').src = data.heroImg;
    }

    // 2. YouTube
    const ytContainer = document.getElementById('dynamic-yt-container');
    const vId = this.parseYoutubeId(data.ytUrl);
    ytContainer.innerHTML = vId 
      ? `<iframe width="560" height="315" src="https://www.youtube.com/embed/${vId}" frameborder="0" allowfullscreen></iframe>`
      : `<div style="padding:40px; text-align:center; color:#999;">動画未設定</div>`;

    // 3. SNSリンク（公式アイコン表示に変更）
    const snsContainer = document.getElementById('dynamic-sns-container');
    const snsList = typeof data.snsJson === 'string' ? JSON.parse(data.snsJson || "[]") : data.snsJson;
    snsContainer.innerHTML = (snsList || []).map(sns => {
      const config = this.snsConfig[sns.platform] || { icon: 'link', colorClass: 'default' };
      return `
        <a href="${sns.url}" class="sns-row" target="_blank" rel="noopener">
          <div class="sns-left">
            <i data-lucide="${config.icon}" class="sns-icon-lucide ${config.colorClass}"></i>
            <span>${sns.platform}</span>
          </div>
          <span class="arrow">＞</span>
        </a>`;
    }).join('');

    // 4. 住所テキスト
    document.getElementById('dynamic-addr').textContent = data.address || "";

    // 5. マップ反映
    const mapContainer = document.getElementById('dynamic-map-container');
    const embedUrl = this.generateEmbedMapUrl(data.address, data.mapUrl);
    mapContainer.innerHTML = embedUrl
      ? `<iframe src="${embedUrl}" loading="lazy" allowfullscreen></iframe>`
      : `<div style="padding:20px; text-align:center; color:#999;">地図未設定</div>`;

    // アイコン生成
    if (window.lucide) lucide.createIcons();
  },

  parseYoutubeId(url) {
    if (!url) return null;
    const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/);
    return match ? match[1] : null;
  }
};

// PDF.js等の初期化ロジック
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let carouselIndices = {};
let carouselTotalSlides = {};

document.addEventListener('DOMContentLoaded', () => {
  fetch('data/static-texts.json')
    .then(res => res.json())
    .then(data => {
      const page = document.body.dataset.page;
      if (data.pageHeaders && data.pageHeaders[page]) {
        const header = data.pageHeaders[page];
        document.getElementById('page-header-text').textContent = header.text;
        const linksWrapper = document.getElementById('page-header-links');
        if (header.links) {
          header.links.forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = item.url; a.textContent = item.label; a.target = '_blank';
            li.appendChild(a); linksWrapper.appendChild(li);
          });
        }
      }
      if (data.activities && data.activities.reports) {
        const reports = data.activities.reports
          .map((r, i) => ({ ...r, originalIndex: i }))
          .sort((a, b) => b.year - a.year)
          .slice(0, 4);
        renderPolicyCarousel(reports);
      }
      loadLatestShihoPress();
    });

  fetch('/api/top-page')
    .then(res => res.json())
    .then(data => ContentManager.applyData(data))
    .catch(err => console.error(err));
});

window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'LIVE_PREVIEW_UPDATE') {
    ContentManager.applyData(event.data.payload);
  }
});

function renderPolicyCarousel(reports) {
  const container = document.getElementById('policy-carousel-container');
  const yearKey = 'policy_latest';
  carouselTotalSlides[yearKey] = reports.length;
  carouselIndices[yearKey] = 0;
  container.innerHTML = `<div class="pdf-year-section" data-carousel-year="${yearKey}"><div class="pdf-carousel-wrapper"><div class="pdf-carousel"><button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${yearKey}')">❮</button><div class="pdf-carousel-inner" id="pdf-carousel-inner-${yearKey}">${reports.map(r => `<div class="pdf-item" onclick="location.href='article.html?type=report&index=${r.originalIndex}'"><div class="pdf-item-icon">📢</div><div class="pdf-item-meta">${r.year}年</div><h3>${r.title}</h3><p>${r.description || '活動内容の詳細はこちらからご覧いただけます。'}</p><div class="pdf-actions"><span class="pdf-btn">詳細を見る</span></div></div>`).join('')}</div><button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${yearKey}')">❯</button></div><div class="carousel-dots">${reports.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${yearKey}', ${i})"></div>`).join('')}</div></div></div>`;
  updateCarouselIndex(yearKey);
}

async function loadLatestShihoPress() {
  try {
    const response = await fetch('/api/pdfs');
    const pdfs = response.ok ? await response.json() : [];
    renderShihoPressCarousel(pdfs);
  } catch (e) { console.error(e); }
}

function renderShihoPressCarousel(pdfs) {
  const container = document.getElementById('shiho-press-container');
  if (!pdfs || !pdfs.length) return;
  const latestYear = new Date(pdfs[0].created_at).getFullYear();
  const yearPdfs = pdfs.filter(p => new Date(p.created_at).getFullYear() === latestYear);
  carouselTotalSlides[latestYear] = yearPdfs.length;
  carouselIndices[latestYear] = 0;
  container.innerHTML = `<div class="pdf-year-section" data-carousel-year="${latestYear}"><div class="pdf-carousel-wrapper"><div class="pdf-year-title">${latestYear}年</div><div class="pdf-carousel"><button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${latestYear}')">❮</button><div class="pdf-carousel-inner" id="pdf-carousel-inner-${latestYear}">${yearPdfs.map((pdf, index) => `<div class="pdf-item"><div class="pdf-thumbnail-container" id="thumb-${latestYear}-${index}"><div class="thumbnail-loading">生成中...</div></div><h3 onclick="window.open('${pdf.file_path}', '_blank')">${pdf.title}</h3>${pdf.description ? `<p>${pdf.description}</p>` : ''}<div class="pdf-item-meta" style="margin-bottom:10px; font-size:0.85em; color:#666;">${pdf.created_at ? `アップロード日時: ${new Date(pdf.created_at).toLocaleDateString('ja-JP')}` : ''}</div><div class="pdf-actions"><a href="${pdf.file_path}" target="_blank" class="pdf-btn">PDFを表示</a></div></div>`).join('')}</div><button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${latestYear}')">❯</button></div><div class="carousel-dots">${yearPdfs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${latestYear}', ${i})"></div>`).join('')}</div></div></div>`;
  updateCarouselIndex(latestYear);
  generateThumbnails(yearPdfs, latestYear);
}

async function generateThumbnails(pdfs, year) {
  for (let i = 0; i < pdfs.length; i++) {
    const thumbContainer = document.getElementById(`thumb-${year}-${i}`);
    try {
      const loadingTask = pdfjsLib.getDocument(pdfs[i].file_path);
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 0.4 });
      const canvas = document.createElement('canvas');
      canvas.height = viewport.height; canvas.width = viewport.width;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
      const img = document.createElement('img');
      img.src = canvas.toDataURL(); img.className = 'pdf-thumbnail-img';
      img.onclick = () => window.open(pdfs[i].file_path, '_blank');
      thumbContainer.innerHTML = ''; thumbContainer.appendChild(img);
    } catch (err) { thumbContainer.innerHTML = '📄'; }
  }
}

/* カルーセル制御 (ループ対応版) */
function updateCarouselIndex(key) {
  const section = document.querySelector(`[data-carousel-year="${key}"]`);
  if (!section) return;
  const inner = section.querySelector('.pdf-carousel-inner');
  const items = section.querySelectorAll('.pdf-item');
  const index = carouselIndices[key];
  
  // 表示数の計算
  const visibleItems = window.innerWidth < 768 ? 1 : (window.innerWidth < 1024 ? 2 : 3);
  const itemWidth = 100 / visibleItems;
  const offset = (visibleItems - 1) / 2;
  
  inner.style.transform = `translateX(${-(index - offset) * itemWidth}%)`;
  items.forEach((item, i) => item.classList.toggle('center', i === index));
  
  const dots = section.querySelectorAll('.dot');
  dots.forEach((dot, i) => dot.classList.toggle('active', i === index));

  // ボタンを常に表示（ループ対応）
  const prevBtn = section.querySelector('.carousel-prev');
  const nextBtn = section.querySelector('.carousel-next');
  if (prevBtn) prevBtn.style.display = 'block';
  if (nextBtn) nextBtn.style.display = 'block';
}

function handlePrevClickIndex(key) { 
  const total = carouselTotalSlides[key];
  if (carouselIndices[key] > 0) {
    carouselIndices[key]--;
  } else {
    carouselIndices[key] = total - 1; // 最初なら最後へ
  }
  updateCarouselIndex(key);
}

function handleNextClickIndex(key) { 
  const total = carouselTotalSlides[key];
  if (carouselIndices[key] < total - 1) {
    carouselIndices[key]++;
  } else {
    carouselIndices[key] = 0; // 最後なら最初へ
  }
  updateCarouselIndex(key);
}

function goToSlideIndex(key, index) { carouselIndices[key] = index; updateCarouselIndex(key); }
window.addEventListener('resize', () => Object.keys(carouselIndices).forEach(updateCarouselIndex));
</script>
<script src="src/header.js"></script>
</body>
</html>
