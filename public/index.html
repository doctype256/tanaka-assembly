        <a href="https://www.facebook.com/people/Shiho-Tanaka/pfbid0..." class="sns-row" target="_blank" rel="noopener">

<section class="page-header">
  <div class="page-header-inner">
    <h2 class="page-header-title" id="page-header-title"></h2>
    <p class="page-header-text" id="page-header-text"></p>
    <div class="page-header-columns">
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="page-header-map"></div>
      </div>
      <ul class="page-header-links" id="page-header-links"></ul>
    </div>
  </div>
</section>

<script>
// --- PDF.js 初期化 ---
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let carouselIndices = {};
let carouselTotalSlides = {};

document.addEventListener('DOMContentLoaded', () => {
  fetch('data/static-texts.json')
    .then(res => res.json())
    .then(data => {
      const page = document.body.dataset.page;
      if (data.pageHeaders && data.pageHeaders[page]) {
        const header = data.pageHeaders[page];
        document.getElementById('page-header-title').textContent = header.title;
        document.getElementById('page-header-text').textContent = header.text;
        const mapWrapper = document.getElementById('page-header-map');
        if (header.mapEmbed) {
          mapWrapper.innerHTML = `<iframe src="${header.mapEmbed}" loading="lazy" allowfullscreen allow="compute-pressure"></iframe>`;
        }
        const linksWrapper = document.getElementById('page-header-links');
        if (header.links) {
          header.links.forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = item.url; a.textContent = item.label; a.target = '_blank';
            li.appendChild(a); linksWrapper.appendChild(li);
          });
        }
      }

      if (data.activities && data.activities.reports) {
        const reports = data.activities.reports
          .map((r, i) => ({ ...r, originalIndex: i }))
          .sort((a, b) => b.year - a.year)
          .slice(0, 4);
        renderPolicyCarousel(reports);
      }

      loadLatestShihoPress();
    });
});

/* 活動報告カルーセル表示 */
function renderPolicyCarousel(reports) {
  const container = document.getElementById('policy-carousel-container');
  const yearKey = 'policy_latest';
  carouselTotalSlides[yearKey] = reports.length;
  carouselIndices[yearKey] = 0;

  container.innerHTML = `
    <div class="pdf-year-section" data-carousel-year="${yearKey}">
      <div class="pdf-carousel-wrapper">
        <div class="pdf-carousel">
          <button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${yearKey}')">❮</button>
          <div class="pdf-carousel-inner" id="pdf-carousel-inner-${yearKey}">
            ${reports.map(r => `
              <div class="pdf-item" onclick="location.href='article.html?type=report&index=${r.originalIndex}'">
                <div class="pdf-item-icon">📢</div>
                <div class="pdf-item-meta">${r.year}年</div>
                <h3>${r.title}</h3>
                <p>${r.description || '活動内容の詳細はこちらからご覧いただけます。'}</p>
                <div class="pdf-actions">
                  <span class="pdf-btn">詳細を見る</span>
                </div>
              </div>
            `).join('')}
          </div>
          <button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${yearKey}')">❯</button>
        </div>
        <div class="carousel-dots">
          ${reports.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${yearKey}', ${i})"></div>`).join('')}
        </div>
      </div>
    </div>
  `;
  updateCarouselIndex(yearKey);
}

/* Shiho Press (PDF) 読込 */
async function loadLatestShihoPress() {
  try {
    const response = await fetch('/api/pdfs');
    const pdfs = response.ok ? await response.json() : [];
    renderShihoPressCarousel(pdfs);
  } catch (e) { console.error(e); }
}

function renderShihoPressCarousel(pdfs) {
  const container = document.getElementById('shiho-press-container');
  if (!pdfs || !pdfs.length) return;
  const latestYear = new Date(pdfs[0].created_at).getFullYear();
  const yearPdfs = pdfs.filter(p => new Date(p.created_at).getFullYear() === latestYear);
  carouselTotalSlides[latestYear] = yearPdfs.length;
  carouselIndices[latestYear] = 0;
  container.innerHTML = `
    <div class="pdf-year-section" data-carousel-year="${latestYear}">
      <div class="pdf-carousel-wrapper">
        <div class="pdf-year-title">${latestYear}年</div>
        <div class="pdf-carousel">
          <button class="carousel-nav carousel-prev" onclick="handlePrevClickIndex('${latestYear}')">❮</button>
          <div class="pdf-carousel-inner" id="pdf-carousel-inner-${latestYear}">
            ${yearPdfs.map((pdf, index) => {
              const dateStr = pdf.created_at ? `アップロード日時: ${new Date(pdf.created_at).toLocaleDateString('ja-JP')}` : '';
              return `
                <div class="pdf-item">
                  <div class="pdf-thumbnail-container" id="thumb-${latestYear}-${index}">
                    <div class="thumbnail-loading">生成中...</div>
                  </div>
                  <h3 onclick="window.open('${pdf.file_path}', '_blank')">${pdf.title}</h3>
                  ${pdf.description ? `<p>${pdf.description}</p>` : ''}
                  <div class="pdf-item-meta" style="margin-bottom: 10px; font-size: 0.85em; color: #666;">${dateStr}</div>
                  <div class="pdf-actions"><a href="${pdf.file_path}" target="_blank" class="pdf-btn">PDFを表示</a></div>
                </div>`;
            }).join('')}
          </div>
          <button class="carousel-nav carousel-next" onclick="handleNextClickIndex('${latestYear}')">❯</button>
        </div>
        <div class="carousel-dots">
          ${yearPdfs.map((_, i) => `<div class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlideIndex('${latestYear}', ${i})"></div>`).join('')}
        </div>
      </div>
    </div>`;
  updateCarouselIndex(latestYear);
  generateThumbnails(yearPdfs, latestYear);
}

/* サムネイル生成関数 (getDocumentの書き方を修正) */
async function generateThumbnails(pdfs, year) {
  for (let i = 0; i < pdfs.length; i++) {
    const thumbContainer = document.getElementById(`thumb-${year}-${i}`);
    try {
      // 修正: オブジェクト形式 { url: pdfPath } で渡す
      const loadingTask = pdfjsLib.getDocument({ url: pdfs[i].file_path });
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 0.4 });
      const canvas = document.createElement('canvas');
      canvas.height = viewport.height; canvas.width = viewport.width;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;
      const img = document.createElement('img');
      img.src = canvas.toDataURL(); img.className = 'pdf-thumbnail-img';
      img.onclick = () => window.open(pdfs[i].file_path, '_blank');
      thumbContainer.innerHTML = ''; thumbContainer.appendChild(img);
    } catch (err) { thumbContainer.innerHTML = '📄'; }
  }
}

/* カルーセル制御 (ループ対応版) */
function updateCarouselIndex(key) {
  const section = document.querySelector(`[data-carousel-year="${key}"]`);
  if (!section) return;
  const inner = section.querySelector('.pdf-carousel-inner');
  const items = section.querySelectorAll('.pdf-item');
  const index = carouselIndices[key];
  
  // 表示数の計算
  const visibleItems = window.innerWidth < 768 ? 1 : (window.innerWidth < 1024 ? 2 : 3);
  const itemWidth = 100 / visibleItems;
  const offset = (visibleItems - 1) / 2;
  
  inner.style.transform = `translateX(${-(index - offset) * itemWidth}%)`;
  items.forEach((item, i) => item.classList.toggle('center', i === index));
  
  const dots = section.querySelectorAll('.dot');
  dots.forEach((dot, i) => dot.classList.toggle('active', i === index));

  // ボタンを常に表示（ループ対応）
  const prevBtn = section.querySelector('.carousel-prev');
  const nextBtn = section.querySelector('.carousel-next');
  if (prevBtn) prevBtn.style.display = 'block';
  if (nextBtn) nextBtn.style.display = 'block';
}

function handlePrevClickIndex(key) { 
  const total = carouselTotalSlides[key];
  if (carouselIndices[key] > 0) {
    carouselIndices[key]--;
  } else {
    carouselIndices[key] = total - 1; // 最初なら最後へ
  }
  updateCarouselIndex(key);
}

function handleNextClickIndex(key) { 
  const total = carouselTotalSlides[key];
  if (carouselIndices[key] < total - 1) {
    carouselIndices[key]++;
  } else {
    carouselIndices[key] = 0; // 最後なら最初へ
  }
  updateCarouselIndex(key);
}

function goToSlideIndex(key, index) { carouselIndices[key] = index; updateCarouselIndex(key); }
window.addEventListener('resize', () => Object.keys(carouselIndices).forEach(updateCarouselIndex));
</script>
<script src="src/header.js"></script>
</body>
</html>
