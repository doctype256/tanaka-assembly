<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お問い合わせ | 田中しほ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body data-page="contact">

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="contact-section">
    <h1 class="contact-title" id="contact-title" style="font-family: 'Noto Serif JP', serif;"></h1>
    <p class="contact-text" id="contact-text"></p>

    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label for="name">お名前 <span class="required">必須</span></label>
        <input type="text" id="name" name="name" required>
      </div>

      <div class="form-group">
        <label for="furigana">フリガナ <span class="required">必須</span></label></label>
        <input type="text" id="furigana" name="furigana">
      </div>

      <div class="form-group">
        <label for="email">メールアドレス <span class="required">必須</span></label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
        <textarea id="message" name="message" rows="8" required></textarea>
      </div>

      <div class="form-group privacy">
        <label class="privacy-label">プライバシーポリシー</label>
        <div class="privacy-box" id="privacy-body"></div>
        <label class="checkbox">
          <input type="checkbox" id="privacy-agree" required>
          <span id="privacy-agree-text"></span>
        </label>
      </div>

      <button type="submit" class="submit-button" id="submit-btn-text">送信する</button>
    </form>
  </section>
</main>

<script>
  // src/contact.js

document.addEventListener('DOMContentLoaded', () => {
  fetch('data/static-texts.json')
    .then(res => res.json())
    .then(data => {
      // 1. ヘッダー情報の反映
      const headerName = data.rinen ? data.rinen.name : data.profile.name;
      const headerNameElement = document.getElementById('header-name');
      if (headerNameElement) headerNameElement.textContent = headerName;
      
      // 2. お問い合わせ(contact)用テキストの反映
      const contactConfig = data.contact;
      if (contactConfig) {
        document.title = `${contactConfig.title} | ${headerName}`;
        document.getElementById('contact-title').textContent = contactConfig.title;
        document.getElementById('contact-text').textContent = contactConfig.text;
        
        // プライバシーポリシーの反映
        const bodyWrapper = document.getElementById('privacy-body');
        if (bodyWrapper && contactConfig.privacy) {
          bodyWrapper.innerHTML = ''; 
          contactConfig.privacy.body.forEach(text => {
            const p = document.createElement('p');
            p.textContent = text;
            bodyWrapper.appendChild(p);
          });
          document.getElementById('privacy-agree-text').textContent = contactConfig.privacy.checkboxLabel;
        }
      }

      // 3. フォーム送信処理
      const contactForm = document.getElementById('contact-form');
      if (contactForm) {
        contactForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          // 各項目の値を取得
          const formData = {
            name: document.getElementById('name').value.trim(),
            furigana: document.getElementById('furigana').value.trim(),
            email: document.getElementById('email').value.trim(),
            message: document.getElementById('message').value.trim(),
          };

          // バリデーション
          if (!formData.name || !formData.email || !formData.message) {
            alert('必須項目をすべて入力してください。');
            return;
          }

          try {
            // APIエンドポイントはサーバー側の設定に合わせて変更してください
            const response = await fetch('/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(formData),
            });

            if (response.ok) {
              // 送信成功時
              window.location.href = `thanks.html?type=contact`;
            } else {
              const error = await response.json();
              alert(`送信に失敗しました: ${error.error}`);
            }
          } catch (error) {
            console.error("送信エラー:", error);
            alert(`送信中にエラーが発生しました。`);
          }
        });
      }
    })
    .catch(error => console.error("データの読み込みに失敗しました:", error));
});
</script>

<script src="src/header.js"></script>
<script type="module" src="src/contact.js"></script>
</body>
</html>
