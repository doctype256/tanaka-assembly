<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #ffffff; }
        
        /* SNSブランドカラー設定 */
        .sns-instagram { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); color: white; }
        .sns-facebook { background-color: #1877F2; color: white; }
        .sns-x { background-color: #000000; color: white; }
        .sns-tiktok { background-color: #000000; color: white; }
        .sns-line { background-color: #06C755; color: white; }
    </style>
</head>
<body class="text-slate-800">

<div id="content-area">
    <div class="w-full bg-white overflow-hidden flex justify-center border-b border-stone-100">
        <img id="hero-img" src="" class="w-full h-auto max-h-[75vh] object-contain" alt="Hero">
    </div>

    <main class="max-w-5xl mx-auto px-6 py-20 md:px-12">
        <div class="grid md:grid-cols-2 gap-16 border-t border-stone-100 pt-20">
            <div class="space-y-16">
                <section>
                    <h2 class="text-[11px] font-bold text-stone-400 tracking-[0.3em] mb-8 uppercase">Location</h2>
                    <p id="addr" class="text-3xl font-bold text-slate-900 leading-tight"></p>
                </section>
                <section>
                    <h2 class="text-[11px] font-bold text-stone-400 tracking-[0.3em] mb-8 uppercase">Social Networks</h2>
                    <div id="sns-container" class="flex flex-wrap gap-4"></div>
                </section>
            </div>
            <section>
                <h2 class="text-[11px] font-bold text-stone-400 tracking-[0.3em] mb-8 uppercase">Promotion Movie</h2>
                <div id="yt-container" class="aspect-video bg-stone-50 rounded-[2.5rem] overflow-hidden shadow-2xl shadow-stone-200"></div>
            </section>
        </div>

        <section class="mt-24">
            <h2 class="text-[11px] font-bold text-stone-400 tracking-[0.3em] mb-8 uppercase text-center">Google Map</h2>
            <div id="map-container" class="w-full h-[500px] bg-stone-50 rounded-[3rem] overflow-hidden border border-stone-100 shadow-sm"></div>
        </section>
    </main>
</div>

<script>
    const snsConfig = {
        'Instagram': { icon: 'instagram', class: 'sns-instagram' },
        'Facebook': { icon: 'facebook', class: 'sns-facebook' },
        'X': { icon: 'twitter', class: 'sns-x' },
        'TikTok': { icon: 'music', class: 'sns-tiktok' },
        'LINE': { icon: 'message-circle', class: 'sns-line' }
    };

    // 画面の更新処理
    function updateDisplay(data) {
        if (!data) return;

        // 画像
        if (data.heroImg) document.getElementById('hero-img').src = data.heroImg;
        
        // 住所
        document.getElementById('addr').innerText = data.address || "未設定";

        // SNSリンク
        const snsContainer = document.getElementById('sns-container');
        const snsList = JSON.parse(data.snsJson || "[]");
        snsContainer.innerHTML = snsList.map(sns => {
            const config = snsConfig[sns.platform] || { icon: 'link', class: 'bg-stone-100 text-slate-400' };
            return `
                <a href="${sns.url}" target="_blank" class="${config.class} flex items-center gap-2 px-6 py-3 rounded-full text-xs font-bold shadow-md transition-transform hover:scale-105">
                    <i data-lucide="${config.icon}" class="w-4 h-4"></i>
                    <span>${sns.platform}</span>
                </a>`;
        }).join('');

        // YouTube
        const vId = data.ytUrl ? data.ytUrl.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/))([a-zA-Z0-9_-]{11})/) : null;
        document.getElementById('yt-container').innerHTML = vId ? `<iframe src="https://www.youtube.com/embed/${vId[1]}" class="w-full h-full border-0" allowfullscreen></iframe>` : "";

        // Map
        document.getElementById('map-container').innerHTML = (data.mapUrl && data.mapUrl.startsWith('http')) ? `<iframe src="${data.mapUrl}" class="w-full h-full border-0" loading="lazy"></iframe>` : "";
        
        lucide.createIcons();
    }

    // APIから初期データを取得
    async function loadInitialData() {
        try {
            const res = await fetch('/api/top-page');
            const data = await res.json();
            updateDisplay(data);
        } catch (err) { console.error("Load Error:", err); }
    }

    // 【重要】管理画面からのリアルタイムプレビュー命令を受信
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'LIVE_PREVIEW_UPDATE') {
            updateDisplay(event.data.payload);
        }
    });

    loadInitialData();
</script>
</body>
</html>
