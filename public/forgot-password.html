<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>パスワード再設定</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .container { max-width: 400px; margin: auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input { width: 100%; padding: 8px; }
    button { width: 100%; padding: 10px; margin-top: 10px; }
    .message { margin-top: 15px; color: green; }
    .error { margin-top: 15px; color: red; }
  </style>
</head>
<body>
  <div class="container">
    <h2>パスワード再設定</h2>
    <p>登録メールアドレスを入力してください。</p>

    <form id="reset-form">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit">再設定メールを送信</button>
    </form>

    <div id="result"></div>
  </div>

  <script>
    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;

      const res = await fetch("/api/reset-request", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });

      const data = await res.json();

      const result = document.getElementById("result");
      result.textContent = data.message;
      result.className = res.ok ? "message" : "error";
    });
  </script>
</body>
</html>
