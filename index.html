<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOPページ</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>

<body data-page="policy">

 <!-- <div class="font-size-controls" aria-label="文字サイズ変更">
    <button data-size="small">小</button>
    <button data-size="normal" class="active">標準</button>
    <button data-size="large">大</button>

<header>
  <nav class="header-inner">
    <div id="header-name"></div>
    <div id="header-nav"></div>
    <button id="menu-toggle" aria-label="メニュー">☰</button>
  </nav>
</header>

<main>
  <section class="hero-image">
    <img src="assets/トップページ背景.png" alt="子育て支援・活動の入口イメージ">

    <div class="hero-person-layer-index">
    <img src="assets/トップページ田中しほ.png" alt="田中しほ"> </div>
  </section>

  <section class="consultation-section">
    <a href="post.html" class="consultation-banner">
      <div class="banner-content">
        <span class="banner-text">ご相談ポストはコチラ！</span>
        <span class="banner-sub">あなたの声をお聞かせください</span>
      </div>
      <div class="banner-icon">📩</div>
    </a>
  </section>

  <section class="youtube-section">
    <div class="video-wrapper">
      <iframe src="https://www.youtube.com/embed/uLO5zh5Hz6k" title="田中しほ 自己紹介動画" frameborder="0" allowfullscreen></iframe>
    </div>
  </section>

<section class="link-nav-section">
  <div class="link-grid">
    <a href="profile.html" class="link-card profile-link">
      <span class="en">Profile</span>
      <span class="jp">自己紹介 ＞</span>
    </a>
  </div>
</section>

  <section class="news-section">
    <div class="news-block">
      <h2 class="section-title">Shiho Press</h2>
      <div class="card-placeholder">最新号を公開中</div>
      <a href="pdf-text.html" class="more-btn">一覧へ ＞</a>
    </div>
    
    <div class="news-block">
      <h2 class="section-title">最新の活動報告</h2>
      <div class="card-placeholder">直近2件を表示</div>
      <a href="policy.html" class="more-btn">一覧へ ＞</a>
    </div>
  </section>

  <section class="sns-jump-section">
    <h2 class="section-title">SNS</h2>
    <div class="sns-list">
      <a href="#" class="sns-row"><span>X (旧Twitter)</span><span class="arrow">＞</span></a>
      <a href="#" class="sns-row"><span>Instagram</span><span class="arrow">＞</span></a>
      <a href="#" class="sns-row"><span>Facebook</span><span class="arrow">＞</span></a>
    </div>
  </section>
</main>

<section class="page-header">
  <div class="page-header-inner">

    <!-- ▼ タイトル・住所（縦並び） -->
    <h2 class="page-header-title" id="page-header-title"></h2>
    <p class="page-header-text" id="page-header-text"></p>

    <!-- ▼ 横並びエリア（flexはここだけ） -->
    <div class="page-header-columns">

      <!-- 左：マップ -->
      <div class="page-header-left">
        <div class="map-embed-wrapper" id="page-header-map"></div>
      </div>

      <!-- 右：リンク集 -->
      <ul class="page-header-links" id="page-header-links"></ul>

    </div>

  </div>
</section>

<script>
fetch('data/static-texts.json')
  .then(res => res.json())
  .then(data => {

    /* ===== ページヘッダー ===== */
    const page = document.body.dataset.page;
    if (data.pageHeaders && data.pageHeaders[page]) {

      const header = data.pageHeaders[page]; // ← ★これが必要

      document.getElementById('page-header-title').textContent =data.pageHeaders[page].title;
      
      document.getElementById('page-header-text').textContent =data.pageHeaders[page].text;

    /* ▼ Googleマップ埋め込み */
      const mapWrapper = document.getElementById('page-header-map');
      if (header.mapEmbed) {
        mapWrapper.innerHTML = `
          <iframe
            src="${header.mapEmbed}"
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            allowfullscreen
          ></iframe>
        `;
      } else {
        mapWrapper.innerHTML = '';
      }
      /* ▼ リンク集生成 */
        const linksWrapper = document.getElementById('page-header-links');
        linksWrapper.innerHTML = '';
  
        if (header.links && Array.isArray(header.links)) {
          header.links.forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
  
            a.href = item.url;
            a.textContent = item.label;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
  
            li.appendChild(a);
            linksWrapper.appendChild(li);
          });
        }
    }
  });
    /* ==============================
    文字サイズ切替（追記）
    ============================== */
  document.addEventListener('DOMContentLoaded', () => {
    const buttons = document.querySelectorAll('.font-size-controls button');
    if (!buttons.length) return;

    const savedSize = localStorage.getItem('fontSize') || 'normal';
    setFontSize(savedSize);

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const size = btn.dataset.size;
        setFontSize(size);
        localStorage.setItem('fontSize', size);
      });
    });

    function setFontSize(size) {
      document.body.classList.remove('font-small', 'font-normal', 'font-large');
      document.body.classList.add(`font-${size}`);

      buttons.forEach(b => b.classList.remove('active'));
      document
        .querySelector(`.font-size-controls button[data-size="${size}"]`)
        ?.classList.add('active');
    }
  });
</script>

<script src="src/header.js"></script>
</body>
</html>
